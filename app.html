  _liveScan = {stream:null, raf:null, video:null, canvas:null, ctx:null, running:false, timer:null, lastData:null, matchCount:0, jsqrReady:false, tickBusy:false, frameIndex:0};
}

function rotateQrPixels(src, w, h, turns){
  const nw = (turns % 2) ? h : w;
  const nh = (turns % 2) ? w : h;
  const out = new Uint8ClampedArray(src.length);
  for(let y = 0; y < h; y++){
    for(let x = 0; x < w; x++){
      let dx, dy;
      if(turns === 1){ dx = h - 1 - y; dy = x; }
      else if(turns === 2){ dx = w - 1 - x; dy = h - 1 - y; }
      else { dx = y; dy = w - 1 - x; }
      const si = (y * w + x) * 4;
      const di = (dy * nw + dx) * 4;
      out[di] = src[si]; out[di+1] = src[si+1]; out[di+2] = src[si+2]; out[di+3] = src[si+3];
    }
  }
  return {data:out, w:nw, h:nh};
}

function decodeQrImageDataVariants(imageData, w, h, allowRotate){
  if(allowRotate !== false) allowRotate = true;
  let code = jsQR(imageData.data, w, h, {inversionAttempts:'attemptBoth'});
  if(code) return code;
  const src = imageData.data;
  const contrast = new Uint8ClampedArray(src.length);
  const sharpen = new Uint8ClampedArray(src.length);
  const binary = new Uint8ClampedArray(src.length);
  const gray = new Uint8ClampedArray(w * h);
  let sum = 0;
  for(let i = 0, j = 0; i < src.length; i += 4, j++){
    const g = Math.round(0.299*src[i] + 0.587*src[i+1] + 0.114*src[i+2]);
    gray[j] = g;
    sum += g;
    const c = Math.max(0, Math.min(255, (g - 128) * 1.8 + 128));
    contrast[i] = contrast[i+1] = contrast[i+2] = c; contrast[i+3] = 255;
  }
  code = jsQR(contrast, w, h, {inversionAttempts:'attemptBoth'});
  if(code) return code;
  // Unsharp mask léger en niveaux de gris : aide les QR un peu flous sans agrandir le bruit
  // autant qu'un simple contraste global.
  for(let y = 0; y < h; y++){
    for(let x = 0; x < w; x++){
      const j = y * w + x;
      let v = gray[j];
      if(x > 0 && y > 0 && x < w - 1 && y < h - 1){
        const n = gray[j-w] + gray[j+w] + gray[j-1] + gray[j+1];
        v = Math.max(0, Math.min(255, gray[j] * 2.2 - n * 0.3));
      }
      const i = j * 4;
      sharpen[i] = sharpen[i+1] = sharpen[i+2] = v; sharpen[i+3] = 255;
    }
  }
  code = jsQR(sharpen, w, h, {inversionAttempts:'attemptBoth'});
  if(code) return code;
  const threshold = sum / (w * h);
  for(const offset of [0, -22, 22, -42, 42]){
    const th = Math.max(0, Math.min(255, threshold + offset));
    for(let i = 0; i < src.length; i += 4){
      const g = 0.299*src[i] + 0.587*src[i+1] + 0.114*src[i+2];
      const v = g > th ? 255 : 0;
      binary[i] = binary[i+1] = binary[i+2] = v; binary[i+3] = 255;
    }
    code = jsQR(binary, w, h, {inversionAttempts:'attemptBoth'});
    if(code) return code;
  }
  // Binarisation locale (Sauvola) : décisive quand la lumière n'est pas uniforme
  // (ombre partielle, reflet sur film plastique, gradient de luminosité).
  try{
    const win = Math.max(15, Math.min(51, (Math.min(w, h) / 20) | 1));
    const localBin = _sauvolaBinarize(gray, w, h, win, 0.2);
    const packed = new Uint8ClampedArray(w * h * 4);
    for(let j = 0, i = 0; j < localBin.length; j++, i += 4){
      const v = localBin[j];
      packed[i] = packed[i+1] = packed[i+2] = v; packed[i+3] = 255;
    }
    code = jsQR(packed, w, h, {inversionAttempts:'attemptBoth'});
    if(code) return code;
  }catch(e){ /* Sauvola indisponible : on continue */ }
  // Les téléphones tournent parfois le flux/canvas différemment de l'aperçu. Cette passe
  // récupère les QR lus de côté ou à l'envers, surtout en photo de secours.
  if(allowRotate && Math.max(w, h) <= 1800){
    for(const turns of [1, 3, 2]){
      const rot = rotateQrPixels(src, w, h, turns);
      code = decodeQrImageDataVariants({data:rot.data}, rot.w, rot.h, false);
      if(code) return code;
    }
  }
  return null;
}

function decodeQrImageDataFast(imageData, w, h){
  let code = jsQR(imageData.data, w, h, {inversionAttempts:'attemptBoth'});
  if(code) return code;
  // Une seule passe contraste, très rapide : elle récupère beaucoup de QR ternes/flous
  // sans bloquer la boucle caméra comme les traitements lourds.
  const src = imageData.data;
  const contrast = new Uint8ClampedArray(src.length);
  for(let i = 0; i < src.length; i += 4){
    const g = 0.299*src[i] + 0.587*src[i+1] + 0.114*src[i+2];
    const c = Math.max(0, Math.min(255, (g - 128) * 1.6 + 128));
    contrast[i] = contrast[i+1] = contrast[i+2] = c; contrast[i+3] = 255;
  }
  return jsQR(contrast, w, h, {inversionAttempts:'attemptBoth'});
}

function decodeQrWithJsQRFromCanvas(sourceCanvas, priorityRois, opts){
  opts = opts || {};
  const rois = [];
  const addRoi = (x, y, w, h) => {
    x = Math.max(0, Math.round(x)); y = Math.max(0, Math.round(y));
    w = Math.min(sourceCanvas.width - x, Math.round(w)); h = Math.min(sourceCanvas.height - y, Math.round(h));
    if(w < 80 || h < 80) return;
    const key = `${x},${y},${w},${h}`;
    if(!rois.some(r => r.key === key)) rois.push({x,y,w,h,key});
  };
  (priorityRois || []).forEach(r => addRoi(r.x, r.y, r.w, r.h));
  addRoi(0, 0, sourceCanvas.width, sourceCanvas.height);
  const minSide = Math.min(sourceCanvas.width, sourceCanvas.height);
  [0.9, 0.75, 0.6, 0.45].forEach(ratio => {
    const side = minSide * ratio;
    addRoi((sourceCanvas.width - side) / 2, (sourceCanvas.height - side) / 2, side, side);
  });
  // Petites zones décalées : Safari/iPad peut afficher un cadrage différent du flux réel.
  [0.55, 0.42].forEach(ratio => {
    const side = minSide * ratio;
    [[0.25,0.25],[0.75,0.25],[0.25,0.75],[0.75,0.75],[0.5,0.35],[0.5,0.65]].forEach(([px,py]) => {
      addRoi(sourceCanvas.width * px - side / 2, sourceCanvas.height * py - side / 2, side, side);
    });
  });

  const work = document.createElement('canvas');
  const wctx = work.getContext('2d', {willReadFrequently:true});
  const scanRois = opts.live ? rois.slice(0, 6) : rois;
  for(let roiIndex = 0; roiIndex < scanRois.length; roiIndex++){
    const roi = scanRois[roiIndex];
    const maxDim = 1600, minDim = 700;
    const longSide = Math.max(roi.w, roi.h);
    // Deux passes : la mise à l'échelle "raisonnable" (rapide), puis pour les ROIs
    // vraiment petits, une passe 2× en nearest-neighbor qui aide jsQR à retrouver la
    // grille quand le QR occupe moins de ~200 px dans l'image d'origine.
    const scales = [];
    let scale = 1;
    if(longSide > maxDim) scale = maxDim / longSide;
    else if(longSide < minDim) scale = minDim / longSide;
    scales.push(scale);
    if(longSide < 500) scales.push(scale * 1.6);
    for(const s of scales){
      const w = Math.max(1, Math.round(roi.w * s));
      const h = Math.max(1, Math.round(roi.h * s));
      work.width = w; work.height = h;
      wctx.imageSmoothingEnabled = false;
      wctx.drawImage(sourceCanvas, roi.x, roi.y, roi.w, roi.h, 0, 0, w, h);
      const data = wctx.getImageData(0, 0, w, h);
      const code = opts.fast ? decodeQrImageDataFast(data, w, h) : decodeQrImageDataVariants(data, w, h, !opts.live || roiIndex === 0);
      if(code) return code;
    }
  }
  return null;
}

async function decodeQrWithZXingFromCanvas(sourceCanvas, priorityRois, opts){
  opts = opts || {};
  const reader = await ensureZXing();
  const rois = [];
  const addRoi = (x, y, w, h) => {
    x = Math.max(0, Math.round(x)); y = Math.max(0, Math.round(y));
    w = Math.min(sourceCanvas.width - x, Math.round(w)); h = Math.min(sourceCanvas.height - y, Math.round(h));
    if(w < 90 || h < 90) return;
    const key = `${x},${y},${w},${h}`;
    if(!rois.some(r => r.key === key)) rois.push({x,y,w,h,key});
  };
  (priorityRois || []).forEach(r => addRoi(r.x, r.y, r.w, r.h));
  addRoi(0, 0, sourceCanvas.width, sourceCanvas.height);
  const minSide = Math.min(sourceCanvas.width, sourceCanvas.height);
  [0.9, 0.68, 0.5].forEach(ratio => {
    const side = minSide * ratio;
    addRoi((sourceCanvas.width - side) / 2, (sourceCanvas.height - side) / 2, side, side);
  });
  const work = document.createElement('canvas');
  const wctx = work.getContext('2d', {willReadFrequently:true});
  const scanRois = opts.live ? rois.slice(0, 3) : rois;
  for(const roi of scanRois){
    const maxDim = opts.live ? 1200 : 2200;
    const scale = Math.min(1, maxDim / Math.max(roi.w, roi.h));
    const w = Math.max(1, Math.round(roi.w * scale));
    const h = Math.max(1, Math.round(roi.h * scale));
    work.width = w; work.height = h;
    wctx.imageSmoothingEnabled = true;
    wctx.drawImage(sourceCanvas, roi.x, roi.y, roi.w, roi.h, 0, 0, w, h);
    const hit = await reader(wctx.getImageData(0, 0, w, h));
    if(hit) return hit;
  }
  return null;
}

function startLiveQrScan(retryCount){
  retryCount = retryCount || 0;
  const hintEl = document.getElementById('liveScanHint');
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    if(hintEl) hintEl.textContent = "Ce navigateur ne permet pas d'accéder à la caméra ici. Utilise le bouton ci-dessous pour prendre une photo.";
    return;
  }
  // TRÈS IMPORTANT (iOS/Safari) : getUserMedia doit être appelé de façon synchrone à partir
  // du gesture utilisateur. On libère les pistes précédentes puis on demande la caméra
  // SANS aucun await/setTimeout intermédiaire, sinon Safari perd le lien avec le gesture
  // et refuse silencieusement l'autorisation.
  stopLiveQrScan();
  const runId = ++_liveScanRunId;
  setLiveScanStartVisible(false);
  if(hintEl) hintEl.textContent = 'Ouverture de la caméra…';
  const gumPromise = navigator.mediaDevices.getUserMedia({
    // On demande la plus haute résolution raisonnable : les QR petits/éloignés
    // deviennent lisibles quand la vidéo est en 1080p (voire 4K sur iPad Pro).
    // Le navigateur retombera automatiquement sur une résolution plus basse
    // si le capteur ne suit pas.
    video: {
      facingMode:{ideal:'environment'},
      width:{ideal:1920},
      height:{ideal:1080},
      frameRate:{ideal:30}
    },
    audio: false
  });
  // On charge jsQR en parallèle pendant que l'utilisateur autorise la caméra.
  const jsqrPromise = ensureJsQR().catch(() => null);
  ensureZXing().catch(() => null);
  // Préchauffe le détecteur natif / polyfill WASM en parallèle (utile sur iPad)
  getBarcodeDetector().catch(() => null);
  _startLiveQrScanAsync(gumPromise, jsqrPromise, retryCount, hintEl, runId);
}

async function _startLiveQrScanAsync(gumPromise, jsqrPromise, retryCount, hintEl, runId){
  try{
    const stream = await withTimeout(gumPromise, 30000, 'Ouverture de la caméra');
    if(runId !== _liveScanRunId){ stream.getTracks().forEach(t => t.stop()); return; }
    const track = stream.getVideoTracks()[0];
    const video = document.getElementById('liveScanVideo');
    if(!video){ stream.getTracks().forEach(t => t.stop()); return; } // modal fermé entretemps
    video.srcObject = stream;
    const canvas = document.createElement('canvas');
    _liveScan = {stream, raf:null, video, canvas, ctx:canvas.getContext('2d', {willReadFrequently:true}), running:true, timer:null, lastData:null, lastSource:null, matchCount:0, jsqrReady:false, tickBusy:false, frameIndex:0};
    // On attend que la vidéo ait vraiment des dimensions avant de commencer à scanner,
    // sinon getImageData plante sur un canvas de taille 0 (fréquent sur iOS/Safari).
    await new Promise((resolve) => {
      if(video.readyState >= 1 && video.videoWidth) return resolve();
      const done = () => resolve();
      video.addEventListener('loadedmetadata', done, {once:true});
      video.addEventListener('canplay', done, {once:true});
      setTimeout(done, 1800);
    });
    try{ await video.play(); }catch(playErr){
      // Autoplay refusé (iOS bloque parfois après un stop/start rapide) : on retente au premier tap.
      const resume = () => { video.play().catch(()=>{}); document.removeEventListener('touchend', resume); document.removeEventListener('click', resume); };
      document.addEventListener('touchend', resume, {once:true});
      document.addEventListener('click', resume, {once:true});
    }
    if(track && track.applyConstraints){
      track.applyConstraints({advanced:[{focusMode:'continuous'}, {exposureMode:'continuous'}, {whiteBalanceMode:'continuous'}]}).catch(()=>{});
    }
    setupLiveScanCameraControls(track);
    jsqrPromise.then(() => {
      if(runId === _liveScanRunId && _liveScan.running) _liveScan.jsqrReady = (typeof jsQR === 'function');
    });
    // Watchdog écran noir : si au bout de 1.2s la vidéo n'a toujours pas de dimensions,
    // on relance proprement une fois (cas typique du retry après une lecture ratée sur Safari).
    setTimeout(() => {
      if(!_liveScan.running) return;
      const v = _liveScan.video;
      if(!v || !v.videoWidth || !v.videoHeight){
        if(retryCount < 1){
          if(hintEl) hintEl.textContent = 'Redémarrage de la caméra…';
          startLiveQrScan(retryCount + 1);
        }else{
          if(hintEl) hintEl.textContent = "La caméra n'a pas démarré. Touche l'écran, ou utilise le bouton ci-dessous pour prendre une photo.";
          setLiveScanStartVisible(true, 'Redémarrer la caméra');
        }
      }
    }, 1200);
    if(hintEl) hintEl.textContent = 'Recherche du QR code…';
    _liveScan.timer = setTimeout(() => {
      const h = document.getElementById('liveScanHint');
      if(h && _liveScan.running) h.textContent = 'Toujours rien ? Rapproche-toi et évite les reflets — ou prends une photo ci-dessous.';
    }, 12000);
    liveQrTick();
  }catch(err){
    console.error(err);
    let msg = "Impossible d'accéder à la caméra. Utilise le bouton ci-dessous pour prendre une photo.";
    if(err && err.name === 'NotAllowedError') msg = "Accès à la caméra refusé. Autorise la caméra dans les réglages du navigateur, ou prends une photo ci-dessous.";
    else if(err && err.name === 'NotFoundError') msg = "Aucune caméra détectée. Utilise le bouton ci-dessous pour prendre une photo.";
    if(hintEl) hintEl.textContent = msg;
    setLiveScanStartVisible(true, 'Réessayer la caméra');
  }
}

// Active les commandes optionnelles de la caméra en direct : lampe torche, zoom
// (si le capteur les supporte) et mise au point au tap. Sur les téléphones qui
// exposent ces capacités (Android/Chrome principalement), ça change beaucoup la
// fiabilité de la lecture des QR codes petits, éloignés ou dans une lumière faible.
function setupLiveScanCameraControls(track){
  _liveScanCam = {track, zoomRange:null, zoomIndex:0, zoomSteps:[1], torchOn:false, torchSupported:false};
  const tools = document.getElementById('liveScanTools');
  const zoomBtn = document.getElementById('liveScanZoomBtn');
  const torchBtn = document.getElementById('liveScanTorchBtn');
  if(!tools || !track || !track.getCapabilities) return;
  let caps = {};
  try{ caps = track.getCapabilities() || {}; }catch(e){}
  let anyControl = false;
  if(caps.zoom && typeof caps.zoom.max === 'number' && caps.zoom.max > (caps.zoom.min || 1) + 0.05){
    const min = caps.zoom.min || 1;
    const max = caps.zoom.max;
    const steps = [min];
    if(max >= 2) steps.push(2);
    if(max >= 3) steps.push(3);
    if(max >= 5) steps.push(Math.min(5, max));
    _liveScanCam.zoomSteps = steps;
    _liveScanCam.zoomRange = caps.zoom;
    zoomBtn.style.display = 'inline-flex';
    zoomBtn.textContent = steps[0] + '×';
    anyControl = true;
  }else if(zoomBtn){
    zoomBtn.style.display = 'none';
  }
  if(caps.torch){
    _liveScanCam.torchSupported = true;
    torchBtn.style.display = 'inline-flex';
    torchBtn.classList.remove('on');
    anyControl = true;
  }else if(torchBtn){
    torchBtn.style.display = 'none';
  }
  tools.style.display = anyControl ? 'flex' : 'none';
  // Tap-to-focus : sur les capteurs qui exposent pointsOfInterest, ça reprend la MAP
  // pile là où l'utilisateur touche. Sinon on relance juste focus/exposition en continu.
  const video = document.getElementById('liveScanVideo');
  if(video && !video._liveScanTapBound){
    video._liveScanTapBound = true;
    video.addEventListener('click', (ev) => liveScanTapFocus(ev));
  }
}

function toggleLiveScanZoom(){
  const {track, zoomSteps} = _liveScanCam;
  if(!track || !track.applyConstraints || zoomSteps.length < 2) return;
  _liveScanCam.zoomIndex = (_liveScanCam.zoomIndex + 1) % zoomSteps.length;
  const z = zoomSteps[_liveScanCam.zoomIndex];
  track.applyConstraints({advanced:[{zoom:z}]}).catch(()=>{});
  const btn = document.getElementById('liveScanZoomBtn');
  if(btn) btn.textContent = (Number.isInteger(z) ? z : z.toFixed(1)) + '×';
}

function toggleLiveScanTorch(){
  const {track, torchSupported} = _liveScanCam;
  if(!track || !torchSupported || !track.applyConstraints) return;
  const next = !_liveScanCam.torchOn;
  track.applyConstraints({advanced:[{torch:next}]}).then(() => {
    _liveScanCam.torchOn = next;
    const btn = document.getElementById('liveScanTorchBtn');
    if(btn) btn.classList.toggle('on', next);
  }).catch(()=>{});
}

function liveScanTapFocus(ev){
  const {track} = _liveScanCam;
  const video = ev.currentTarget;
  const rect = video.getBoundingClientRect();
  const px = (ev.clientX - rect.left) / rect.width;
  const py = (ev.clientY - rect.top) / rect.height;
  const focusEl = document.getElementById('liveScanFocus');
  if(focusEl){
    focusEl.style.left = (px * 100) + '%';
    focusEl.style.top = (py * 100) + '%';
    focusEl.classList.remove('show');
    // reflow to restart animation
    void focusEl.offsetWidth;
    focusEl.classList.add('show');
  }
  if(!track || !track.applyConstraints) return;
  const constraints = [{focusMode:'single-shot'}, {focusMode:'continuous'}, {exposureMode:'continuous'}];
  let caps = {};
  try{ caps = track.getCapabilities() || {}; }catch(e){}
  if(caps.pointsOfInterest){
    constraints.unshift({pointsOfInterest:[{x:px, y:py}]});
  }
  track.applyConstraints({advanced:constraints}).catch(()=>{});
}

async function liveQrTick(){
  if(!_liveScan.running) return;
  if(_liveScan.tickBusy){
    _liveScan.raf = requestAnimationFrame(liveQrTick);
    return;
  }
  _liveScan.tickBusy = true;
  try{
    const {video, canvas, ctx} = _liveScan;
    if(video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth && video.videoHeight){
      _liveScan.frameIndex = (_liveScan.frameIndex || 0) + 1;
      // On garde la vidéo en pleine résolution (jusqu'à 1600 px) pour ne pas perdre
      // le détail des QR codes petits ou éloignés — jsQR profite énormément du grain
      // supplémentaire, et le BarcodeDetector natif aussi.
      const maxSide = 1600;
      const scale = Math.min(1, maxSide / Math.max(video.videoWidth, video.videoHeight));
      canvas.width = Math.max(1, Math.round(video.videoWidth * scale));
      canvas.height = Math.max(1, Math.round(video.videoHeight * scale));
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const side = Math.round(Math.min(canvas.width, canvas.height) * LIVE_SCAN_FRAME_RATIO);
      const sx = Math.round((canvas.width - side) / 2);
      const sy = Math.round((canvas.height - side) / 2);
      let code = null;
      // 1) Android Chrome : BarcodeDetector natif, testé d'abord directement sur la vidéo
      // puis sur le canvas réduit. C'est nettement plus fiable que jsQR sur mobile.
      const bd = getReadyBarcodeDetector();
      if(bd){
        const pickNative = (results) => (results && results.length) ? results[0] : null;
        try{
          let pick = pickNative(await bd.detect(video));
          if(!pick) pick = pickNative(await bd.detect(canvas));
          if(pick && pick.rawValue) code = {data: pick.rawValue, source: 'bd'};
        }catch(e){
          try{
            const pick = pickNative(await bd.detect(canvas));
            if(pick && pick.rawValue) code = {data: pick.rawValue, source: 'bd'};
          }catch(e2){ /* fallback jsQR */ }
        }
      }
      // 2) Fallback jsQR : passe rapide à chaque frame, passe renforcée moins souvent.
      if(!code && _liveScan.jsqrReady && typeof jsQR === 'function'){
        const regions = [{x:0, y:0, w:canvas.width, h:canvas.height}, {x:sx, y:sy, w:side, h:side}];
        let jsqrCode = decodeQrWithJsQRFromCanvas(canvas, regions, {live:true, fast:true});
        if(!jsqrCode && _liveScan.frameIndex % 4 === 0){
          jsqrCode = decodeQrWithJsQRFromCanvas(canvas, regions, {live:true});
        }
        if(jsqrCode) code = {data: jsqrCode.data, source: 'jsqr'};
      }
      if(!code && _liveScan.frameIndex % 2 === 0){
        const zxingCode = await decodeQrWithZXingFromCanvas(canvas, [{x:0, y:0, w:canvas.width, h:canvas.height}], {live:true}).catch(() => null);
        if(zxingCode) code = zxingCode;
      }
      if(code){
        // Raccourci : si le QR décode déjà un identifiant de fût connu, on accepte
        // immédiatement sans attendre une deuxième confirmation. C'est ce qui rend
        // le scan quasi instantané dès que la caméra distingue le motif.
        const quickId = parseFutIdFromQr(code.data);
        if(quickId && typeof FUTS !== 'undefined' && FUTS[quickId]){
          _liveScan.running = false;
          onLiveQrDetected(code);
          return;
        }
        if(_liveScan.lastData === code.data){
          _liveScan.matchCount++;
        }else{
          _liveScan.lastData = code.data;
          _liveScan.lastSource = code.source;
          _liveScan.matchCount = 1;
        }
        const needed = code.source === 'bd' ? LIVE_SCAN_CONFIRM_COUNT_BD : LIVE_SCAN_CONFIRM_COUNT_JSQR;
        if(_liveScan.matchCount >= needed){
          _liveScan.running = false;
          onLiveQrDetected(code);
          return;
        }
      }else{
        _liveScan.lastData = null;
        _liveScan.lastSource = null;
        _liveScan.matchCount = 0;
      }
    }
  }catch(err){
    console.warn('Frame de scan ignorée :', err);
  }finally{
    _liveScan.tickBusy = false;
  }
  _liveScan.raf = requestAnimationFrame(liveQrTick);
}

async function onLiveQrDetected(code){
  stopLiveQrScan();
  const stepEl = document.getElementById('scanStepContent');
  const id = parseFutIdFromQr(code.data);
  if(!id || !FUTS[id]){
    getEditedScanParsed();
    if(stepEl){
      stepEl.innerHTML = `
            <div class="scan-error">Ce QR code ne correspond à aucun fût connu de l'application.</div>
        <button type="button" class="scan-capture-btn" style="border:none;margin-top:10px" onclick="showQRStep(_scanState.parsed, true)">Reprendre le scan</button>
      `;
    }
    return;
  }
  await applyScanToFut(id, getEditedScanParsed());
}

function parseFutIdFromQr(data){
  const raw = String(data || '').trim();
  if(!raw) return null;
  let m = raw.match(/^FUT[:=](.+)$/i);
  if(m) return decodeURIComponent(m[1]).trim();
  m = raw.match(/[?#&]fut=([^&]+)/i) || raw.match(/#fut=([^&]+)/i);
  if(m) return decodeURIComponent(m[1]).trim();
  try{
    const u = new URL(raw);
    const v = u.searchParams.get('fut') || (u.hash.match(/fut=([^&]+)/i)||[])[1];
    if(v) return decodeURIComponent(v).trim();
  }catch(e){}
  if(FUTS[raw]) return raw;
  return null;
}

// Solution de secours si la caméra en direct n'est pas disponible (permissions refusées,
// navigateur non compatible…) : on repasse sur une photo unique analysée à plusieurs échelles.
function fallbackQrPhoto(){
  stopLiveQrScan();
  getEditedScanParsed();
  const stepEl = document.getElementById('scanStepContent');
  stepEl.innerHTML = `
    <div>Photographie le QR code du fût.</div>
    <label class="scan-capture-btn" for="scanQrInput" style="margin-top:14px">Photographier le QR code</label>
    <input type="file" id="scanQrInput" accept="image/*" capture="environment" style="display:none">
  `;
  document.getElementById('scanQrInput').addEventListener('change', onQrPhotoSelected);
}

async function onQrPhotoSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  const stepEl = document.getElementById('scanStepContent');
  const {img, url} = await fileToImage(file);
  stepEl.innerHTML = `
    <div>Lecture du QR code…</div>
    <img class="scan-preview" src="${url}">
    <div class="scan-spinner"></div>
  `;
  try{
    await ensureJsQR();
    await ensureZXing().catch(() => null);
    const code = await withTimeout(decodeQrMultiScale(img), 15000, 'Lecture du QR code');
    if(!code){
      throw new Error('QR code non détecté. Cadre-le bien, sans reflet ni flou, en le remplissant le plus possible dans l\'image.');
    }
    const id = parseFutIdFromQr(code.data);
    if(!id || !FUTS[id]){
      throw new Error('Ce QR code ne correspond à aucun fût connu de l\'application.');
    }
    await applyScanToFut(id, getEditedScanParsed());
  }catch(err){
    console.error(err);
    stepEl.innerHTML = `
        <div class="scan-error">${escapeHtml(err.message||'Erreur de lecture du QR code.')}</div>
      <label class="scan-capture-btn" for="scanQrInput" style="margin-top:10px">Réessayer</label>
      <input type="file" id="scanQrInput" accept="image/*" capture="environment" style="display:none">
    `;
    document.getElementById('scanQrInput').addEventListener('change', onQrPhotoSelected);
  }
}

// Essaie de décoder le QR code à plusieurs échelles (une photo entière contient souvent
// un QR relativement petit ; le redimensionner trop tôt peut détruire les détails fins).
async function decodeQrMultiScale(img){
  // 1) Native BarcodeDetector si disponible
  try{
    const bd = await getBarcodeDetector();
    if(bd){
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      const r = await bd.detect(c);
      if(r && r.length && r[0].rawValue) return {data: r[0].rawValue};
    }
  }catch(e){ /* fallback jsQR */ }
  const w0 = img.naturalWidth, h0 = img.naturalHeight;
  const dims = [Math.max(w0, h0), 2600, 2000, 1600, 1200, 900];
  for(const maxDim of dims){
    let w = w0, h = h0;
    if(Math.max(w, h) > maxDim){
      const ratio = maxDim / Math.max(w, h);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const code = decodeQrWithJsQRFromCanvas(canvas);
    if(code) return Promise.resolve(code);
    const zx = await decodeQrWithZXingFromCanvas(canvas).catch(() => null);
    if(zx) return Promise.resolve(zx);
  }
  return Promise.resolve(null);
}

async function applyScanToFut(id, parsed){
  const f = FUTS[id];
  const changes = [];
  if(parsed.contenu && parsed.contenu !== f.contenu){ f.contenu = parsed.contenu; changes.push('nom'); addHistory(f, `Nom de la bière → ${parsed.contenu} (scan étiquette)`); }
  if(parsed.type && parsed.type !== (f.type||'')){ f.type = parsed.type; changes.push('type'); addHistory(f, `Type → ${parsed.type} (scan étiquette)`); }
  if(parsed.volume && parsed.volume !== (f.volume||'')){ f.volume = parsed.volume; changes.push('volume'); addHistory(f, `Volume → ${parsed.volume} L (scan étiquette)`); }
  if(parsed.degre && parsed.degre !== (f.degre||'')){ f.degre = parsed.degre; changes.push('taux'); addHistory(f, `Taux → ${parsed.degre} % (scan étiquette)`); }
  if(parsed.lot && parsed.lot !== (f.lot||'')){ f.lot = parsed.lot; changes.push('lot'); addHistory(f, `N° de lot → ${parsed.lot} (scan étiquette)`); }
  if(parsed.ddm && parsed.ddm !== (f.ddm||'')){ f.ddm = parsed.ddm; changes.push('DDM'); addHistory(f, `DDM → ${parsed.ddm} (scan étiquette)`); }
  if(f.status !== 'plein'){ f.status = 'plein'; changes.push('statut → Plein'); addHistory(f, `Statut → Plein (scan étiquette)`); }
  f.dateMaj = new Date().toISOString();
  await saveFuts();
  closeModal();
  render();
  if(changes.length){
    showToast(`Fût ${id} mis à jour (${changes.join(', ')}).`, 'success');
  }else{
    showToast(`Fût ${id} : aucune information nouvelle détectée sur l'étiquette.`, 'error');
  }
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function showListPage(){ view='list'; if(location.hash) history.replaceState(null,'',location.pathname); render(); }
function showQRPage(){ view='qr'; history.replaceState(null,'',location.pathname+'#qr'); render(); }

// Impression : sur iPad/iPhone, une appli ajoutée à l'écran d'accueil (mode "standalone")
// ne peut pas ouvrir la boîte de dialogue d'impression native d'iOS (limitation système).
// On rouvre alors la page dans Safari (qui le peut), avec l'impression lancée automatiquement.
function printQR(){
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if(isStandalone){
    window.open(location.pathname + '#qr&autoprint=1', '_blank');
  } else {
    window.print();
  }
}

function render(){
  const content = document.getElementById('content');
  const count = Object.keys(FUTS).length;
  document.getElementById('subline').textContent = count
    ? `${count} fût(s) enregistré(s) — données partagées avec ton équipe.`
    : `Aucun fût pour le moment. Ajoute ton premier fût.`;

  if(view === 'qr'){
    renderQR(content);
    return;
  }
  renderList(content);
}

function renderList(content){
  content.innerHTML = `
    <div class="panel search-panel">
      <div class="row">
        <input class="search" id="search-input" placeholder="Rechercher un fût ou un contenu..." value="${escapeAttr(searchTerm)}">
      </div>
      <div class="filters" style="margin-top:10px">
        <div class="chip ${filterStatus==='tous'?'active':''}" onclick="filterStatus='tous';render()">Tous</div>
        <div class="chip ${filterStatus==='sale'?'active':''}" onclick="filterStatus='sale';render()">Sale</div>
        <div class="chip ${filterStatus==='propre'?'active':''}" onclick="filterStatus='propre';render()">Propre</div>
        <div class="chip ${filterStatus==='plein'?'active':''}" onclick="filterStatus='plein';render()">Plein</div>
        <div class="chip ${filterStatus==='encours'?'active':''}" onclick="filterStatus='encours';render()">Client</div>
      </div>
    </div>
    <div class="list" id="futs-list"></div>
  `;
  const input = document.getElementById('search-input');
  input.addEventListener('input', () => {
    searchTerm = input.value;
    renderListItems();
  });
  renderListItems();
}

function renderListItems(){
  const listEl = document.getElementById('futs-list');
  if(!listEl) return;
  let items = Object.values(FUTS);
  if(filterStatus !== 'tous') items = items.filter(f => f.status === filterStatus);
  if(searchTerm) items = items.filter(f => f.id.toLowerCase().includes(searchTerm.toLowerCase()) || (f.contenu||'').toLowerCase().includes(searchTerm.toLowerCase()));
  items.sort((a,b) => a.id.localeCompare(b.id));

  listEl.innerHTML = items.length ? items.map(f => `
        <div class="fut-card" onclick="openDetail('${f.id}')">
          <div class="dot ${f.status}"></div>
          <div class="left-info">
            <div class="fut-id">${escapeHtml(f.id)}</div>
            <div class="fut-meta">${escapeHtml(f.contenu) || 'Vide'}${f.type ? ' · ' + escapeHtml(f.type) : ''}${f.volume ? ' · ' + escapeHtml(f.volume) + 'L' : ''}${f.degre ? ' · ' + escapeHtml(f.degre) + '%' : ''}</div>
          </div>
          <div class="right">
            <span class="badge ${f.status}">${STATUS_LABELS[f.status]}</span>
            <span class="fut-date">${fmtDate(f.dateMaj)}</span>
          </div>
        </div>
      `).join('') : '<div class="empty">Aucun fût ne correspond.</div>';
}

function renderQR(content){
  const items = Object.values(FUTS).sort((a,b)=>a.id.localeCompare(b.id));
  if(!items.length){
    content.innerHTML = '<div class="empty">Ajoute des fûts pour générer leurs QR codes.</div>';
    return;
  }
  content.innerHTML = `
    <div class="panel no-print" style="margin-bottom:10px">
      <div class="row">
        <button class="primary" onclick="printQR()">🖨️ Imprimer tous les QR codes</button>
      </div>
    </div>
    <div class="qr-grid" id="qrGrid"></div>
  `;
  const grid = document.getElementById('qrGrid');
  items.forEach(f => {
    const card = document.createElement('div');
    card.className = 'qr-card';
    const qrDiv = document.createElement('div');
    card.appendChild(qrDiv);
    const label = document.createElement('div');
    label.className = 'id';
    label.textContent = f.id;
    card.appendChild(label);
    const dlBtn = document.createElement('button');
    dlBtn.textContent = '⬇ Télécharger';
    dlBtn.className = 'no-print';
    dlBtn.style.marginTop = '10px';
    dlBtn.style.fontSize = '12.5px';
    dlBtn.style.padding = '8px 10px';
    dlBtn.style.width = '100%';
    card.appendChild(dlBtn);
    grid.appendChild(card);

    // QR plus court = moins de modules = beaucoup plus lisible par Android.
    // On accepte encore les anciens QR en URL complète côté scanner.
    const url = 'FUT:' + encodeURIComponent(f.id);
    try{
      // Résolution native élevée (300px) pour un rendu net à l'impression et au
      // téléchargement, mais affichage contraint en CSS (max-width:100%) pour
      // ne jamais déborder de la carte, quelle que soit la largeur d'écran
      // (mobile Android/iOS, tablette, desktop).
      const canvas = QRBuilder.makeCanvas(url, 300);
      canvas.style.width = '100%';
      canvas.style.height = 'auto';
      qrDiv.appendChild(canvas);
      dlBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'qr-fut-' + f.id + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
    }catch(e){
      qrDiv.textContent = 'Erreur QR';
      console.error(e);
    }
  });
}

function handleHash(){
  const h = location.hash;
  if(/^#qr/.test(h)){
    view = 'qr';
    render();
    if(h.indexOf('autoprint=1') !== -1){
      setTimeout(() => window.print(), 400);
    }
    return;
  }
  const m = h.match(/fut=([^&]+)/);
  if(m){
    const id = decodeURIComponent(m[1]);
    if(FUTS[id]){
      view = 'list';
      render();
      openDetail(id);
    }
  }
}

function waitForFirebase(){
  return new Promise(resolve => {
    if(window.__fb) return resolve();
    const iv = setInterval(() => { if(window.__fb){ clearInterval(iv); resolve(); } }, 50);
  });
}

// Enregistrement du service worker : rend l'app installable (Android + ordinateur)
// et permet l'ouverture même hors-ligne. Échec silencieux si le navigateur ne supporte pas
// (ex: anciens navigateurs) ou si servi en http:// (les service workers exigent https://, sauf en localhost).
function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  let reloadedForSwUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(reloadedForSwUpdate) return;
    reloadedForSwUpdate = true;
    setTimeout(() => location.reload(), 80);
  });
  navigator.serviceWorker.register('/sw.js?v=5', {scope:'/', updateViaCache:'none'})
    .then(reg => { try{ reg.update(); }catch(e){} })
    .catch(e => console.warn('Service worker non enregistré:', e));
}

async function startApp(){
  registerServiceWorker();
  await waitForFirebase();
  await loadMe();
  await loadFuts();
  render();
  handleHash();
  listenFuts();
  window.addEventListener('hashchange', handleHash);
}

// --- Accès protégé par mot de passe (mémorisé sur l'appareil) ---
const APP_PASSWORD = "L'armateur"; // <- change ce mot de passe ici si besoin
const AUTH_KEY = "futs_auth_ok";

function showGate(){
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  setTimeout(() => document.getElementById('gate-pw').focus(), 50);
}

function showApp(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = '';
  startApp();
}

function normalizePw(s){
  return (s || '').trim().replace(/[\u2018\u2019\u02BC\u02BB]/g, "'");
}

function tryLogin(){
  const val = normalizePw(document.getElementById('gate-pw').value);
  const target = normalizePw(APP_PASSWORD);
  const err = document.getElementById('gate-error');
  if(val === target){
    try{ localStorage.setItem(AUTH_KEY, '1'); }catch(e){}
    showApp();
  }else{
    err.textContent = 'Mot de passe incorrect.';
    document.getElementById('gate-pw').value = '';
  }
}

/* ===== Enhancements Lovable : haptique, wake-lock caméra, SW offline ===== */
(function(){
  // Retour haptique sur toast de succès
  try {
    const _origToast = window.showToast;
    if (typeof _origToast === 'function') {
      window.showToast = function(msg, type){
        if (type === 'success' && navigator.vibrate) { try { navigator.vibrate(30); } catch(e){} }
        else if (type === 'error' && navigator.vibrate) { try { navigator.vibrate([40,60,40]); } catch(e){} }
        return _origToast.apply(this, arguments);
      };
    }
  } catch(e){}

  // Empêche l'écran de s'éteindre pendant un scan caméra live
  let _wakeLock = null;
  async function requestWakeLock(){
    try { if ('wakeLock' in navigator) _wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  }
  function releaseWakeLock(){
    try { if (_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch(e){}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && document.querySelector('#liveScanWrap video')) requestWakeLock();
  });
  const _obs = new MutationObserver(() => {
    const hasVideo = !!document.querySelector('#liveScanWrap video');
    if (hasVideo && !_wakeLock) requestWakeLock();
    if (!hasVideo && _wakeLock) releaseWakeLock();
  });
  _obs.observe(document.body, {childList:true, subtree:true});

  // Le service worker est enregistré une seule fois par startApp(), avec mise à jour forcée.
})();
(function initGate(){
  let authed = false;
  try{ authed = localStorage.getItem(AUTH_KEY) === '1'; }catch(e){}
  document.getElementById('gate-pw').addEventListener('keydown', e => {
    if(e.key === 'Enter') tryLogin();
  });
  document.getElementById('gate-btn').addEventListener('click', tryLogin);
  if(authed){
    showApp();
  }else{
    showGate();
  }
})();
</script>
