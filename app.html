<style>
  :root{
    --bg:#0b0f0d;
    --bg-2:#0f1512;
    --panel:#151b17;
    --panel2:#1c2320;
    --panel3:#232b27;
    --border:#2a332d;
    --border-strong:#3a4640;
    --text:#eef2ec;
    --muted:#9aa79b;
    --muted-2:#7d8a7e;
    --accent:#e0b04a;
    --accent-hover:#f0c060;
    --accent-glow: 0 0 0 3px rgba(224,176,74,.15);
    --accent2:#7fae6b;
    --propre:#4aa06a;
    --sale:#c25a48;
    --encours:#d6a63f;
    --plein:#4d92b8;
    --radius:14px;
    --radius-sm:10px;
    --radius-lg:18px;
    --shadow-sm: 0 2px 6px rgba(0,0,0,.25);
    --shadow-md: 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 20px 50px rgba(0,0,0,.55);
    --ease: cubic-bezier(.4,0,.2,1);
    --ease-out: cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(224,176,74,.06), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(127,174,107,.05), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color:var(--text);
    min-height:100vh;
    letter-spacing:-0.005em;
  }
  ::selection{background:rgba(224,176,74,.35);color:#fff;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-strong);}

  .app{max-width:900px;margin:0 auto;padding:22px;animation:fade-up .5s var(--ease-out) both;}
  @keyframes fade-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  h1{
    font-size:23px;margin:0 0 4px;display:flex;align-items:center;gap:12px;
    font-weight:700;letter-spacing:-0.02em;
  }
  .logo-icon{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;
    box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 4px 12px rgba(0,0,0,.4);}

  .gate{
    position:fixed;inset:0;
    background:
      radial-gradient(600px 400px at 50% 30%, rgba(224,176,74,.10), transparent 60%),
      var(--bg);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;
    animation:fade-in .4s ease;
  }
  @keyframes fade-in{from{opacity:0;}to{opacity:1;}}
  .gate-card{
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--border);
    border-radius:22px;
    padding:34px 28px;max-width:340px;width:100%;text-align:center;
    box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.03);
    animation:card-in .5s var(--ease-out) both;
  }
  @keyframes card-in{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .gate-logo{width:72px;height:72px;border-radius:50%;object-fit:cover;margin-bottom:16px;
    box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.5);}
  .gate-card h2{margin:0 0 6px;font-size:20px;font-weight:700;letter-spacing:-0.01em;}
  .gate-card input{text-align:center;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}

  .topbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .armateur-icon{
    display:inline-block; vertical-align:middle;
    background-size:contain; background-position:center; background-repeat:no-repeat;
  }
  .scan-step{text-align:center;padding:6px 0;}
  .scan-step .scan-icon{display:none;}
  .scan-capture-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(180deg, var(--accent-hover), var(--accent));
    color:#241a05;font-weight:700;
    padding:13px 22px;border-radius:12px;cursor:pointer;font-size:14.5px;margin-top:6px;
    box-shadow:0 6px 18px rgba(224,176,74,.28);
    transition:transform .15s var(--ease), box-shadow .2s var(--ease);
  }
  .scan-capture-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(224,176,74,.35);}
  .scan-capture-btn:active{transform:translateY(0);}
  .scan-progress{color:var(--muted);font-size:13px;margin-top:10px;}
  .scan-spinner{
    width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;margin:14px auto 0;animation:scan-spin 0.75s linear infinite;
  }
  @keyframes scan-spin{to{transform:rotate(360deg);}}
  .scan-preview{max-width:100%;max-height:160px;border-radius:12px;margin-top:12px;border:1px solid var(--border);}
  .scan-error{color:#f0998a;font-size:13px;margin-top:10px;}
  .scan-fields{text-align:left;background:var(--panel2);border-radius:12px;padding:14px;margin-top:12px;font-size:13px;
    border:1px solid var(--border);}
  .scan-fields div{padding:3px 0;}
  .scan-fields b{color:var(--muted);font-weight:600;}
  .scan-fields label{margin-top:8px;margin-bottom:4px;}
  .scan-fields input{font-size:13px;padding:8px 10px;border-radius:8px;}
  .scan-fields .scan-field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .live-scan-wrap{position:relative;width:100%;max-width:420px;margin:12px auto 0;border-radius:16px;overflow:hidden;
    background:#000;border:1px solid var(--border);aspect-ratio:4/3;box-shadow:var(--shadow-md);}
  .live-scan-wrap video{width:100%;height:100%;display:block;object-fit:cover;background:#000;}
  .live-scan-frame{position:absolute;top:50%;left:50%;width:88%;aspect-ratio:1/1;transform:translate(-50%,-50%);
    border:3px solid var(--accent);border-radius:10px;box-shadow:0 0 0 2000px rgba(0,0,0,.18), 0 0 24px rgba(224,176,74,.35);
    pointer-events:none;}
  .live-scan-start{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;border:0;border-radius:12px;
    background:linear-gradient(180deg, var(--accent-hover), var(--accent));color:#241a05;font-weight:700;padding:13px 20px;cursor:pointer;
    box-shadow:0 12px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08) inset;}
  .live-scan-hint{color:var(--muted);font-size:12px;margin-top:8px;}
  .live-scan-fallback{background:none;border:none;color:var(--accent);font-size:12px;text-decoration:underline;
    cursor:pointer;margin-top:10px;padding:4px;}
  .live-scan-tools{position:absolute;top:8px;right:8px;z-index:3;display:flex;gap:6px;}
  .live-scan-tools button{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:20px;font-size:13px;padding:6px 10px;cursor:pointer;backdrop-filter:blur(8px);}
  .live-scan-tools button.on{background:var(--accent);color:#241a05;border-color:transparent;}
  .live-scan-focus{position:absolute;width:56px;height:56px;border:2px solid var(--accent);border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .25s;z-index:2;}
  .live-scan-focus.show{opacity:1;animation:focusPulse .6s ease-out;}
  @keyframes focusPulse{0%{transform:translate(-50%,-50%) scale(1.6);opacity:0;}40%{opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:.9;}}

  #toastRoot{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{
    background:rgba(28,35,32,.85);
    backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--border);border-radius:12px;
    padding:12px 20px;font-size:13.5px;box-shadow:var(--shadow-md);
    max-width:90vw;animation:toast-in .3s var(--ease-out);
  }
  .toast.success{border-color:rgba(74,160,106,.5);background:rgba(28,42,28,.85);color:#bfe6b8;}
  .toast.error{border-color:rgba(194,90,72,.5);background:rgba(58,32,28,.85);color:#f3b3a4;}
  @keyframes toast-in{from{opacity:0;transform:translateY(12px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

  button{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    padding:10px 15px; border-radius:11px; cursor:pointer; font-size:13.5px;
    font-family:inherit; font-weight:500;
    transition: background .18s var(--ease), border-color .18s var(--ease), transform .1s var(--ease), box-shadow .2s var(--ease);
  }
  button:hover{background:var(--panel3); border-color:var(--border-strong);}
  button:active{transform:translateY(1px);}
  button:focus-visible{outline:none;box-shadow:var(--accent-glow);border-color:var(--accent);}
  button.primary{
    background:linear-gradient(180deg, var(--accent-hover), var(--accent));
    color:#241a05; border:none; font-weight:700;
    box-shadow:0 4px 14px rgba(224,176,74,.25);
  }
  button.primary:hover{
    background:linear-gradient(180deg, #f5c96e, var(--accent-hover));
    box-shadow:0 8px 20px rgba(224,176,74,.35);
    transform:translateY(-1px);
  }
  button.primary:active{transform:translateY(0);}
  button.danger{background:#3a201c; border-color:#5c2e26; color:#f3b3a4;}
  button.danger:hover{background:#4a2823;border-color:#7a3d33;}

  input,select,textarea{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:11px; padding:10px 13px; font-size:14px; width:100%;
    font-family:inherit;
    transition: border-color .18s var(--ease), box-shadow .2s var(--ease), background .18s var(--ease);
  }
  input:hover,select:hover,textarea:hover{border-color:var(--border-strong);}
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--accent);box-shadow:var(--accent-glow);
    background:var(--panel3);
  }
  input::placeholder,textarea::placeholder{color:var(--muted-2);}

  label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;margin-top:14px;
    text-transform:uppercase;letter-spacing:.04em;font-weight:500;}

  .panel{
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; margin-bottom:16px;
    box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.02);
    animation:panel-in .45s var(--ease-out) both;
  }
  @keyframes panel-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:160px;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}

  .chip{
    padding:7px 14px;border-radius:999px;border:1px solid var(--border);cursor:pointer;
    font-size:12.5px;background:var(--panel2);font-weight:500;
    transition: all .18s var(--ease);
  }
  .chip:hover{border-color:var(--border-strong);background:var(--panel3);}
  .chip.active{
    background:linear-gradient(180deg, #8fbf7b, var(--accent2));
    color:#0d1a0e;border-color:transparent;font-weight:600;
    box-shadow:0 4px 12px rgba(127,174,107,.25);
  }

  .list{display:grid;gap:9px;}
  .fut-card{
    background:linear-gradient(180deg, var(--panel2), #1a201d);
    border:1px solid var(--border); border-radius:13px;
    padding:13px 15px; display:flex; align-items:center; gap:12px; cursor:pointer;
    transition: transform .18s var(--ease-out), border-color .18s var(--ease), box-shadow .25s var(--ease), background .2s var(--ease);
    animation:card-slide .35s var(--ease-out) both;
  }
  @keyframes card-slide{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .fut-card:hover{
    border-color:var(--border-strong);
    transform:translateY(-2px);
    box-shadow:var(--shadow-md);
    background:linear-gradient(180deg, #232b27, var(--panel2));
  }
  .fut-card:active{transform:translateY(-1px);}

  .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,255,255,.02);}
  .dot.propre{background:var(--propre);box-shadow:0 0 12px rgba(74,160,106,.55), 0 0 0 3px rgba(74,160,106,.08);}
  .dot.sale{background:var(--sale);box-shadow:0 0 12px rgba(194,90,72,.55), 0 0 0 3px rgba(194,90,72,.08);}
  .dot.encours{background:var(--encours);box-shadow:0 0 12px rgba(214,166,63,.55), 0 0 0 3px rgba(214,166,63,.08);}
  .dot.plein{background:var(--plein);box-shadow:0 0 12px rgba(77,146,184,.55), 0 0 0 3px rgba(77,146,184,.08);}

  .fut-id{font-weight:700;font-size:15px;letter-spacing:.3px;}
  .fut-meta{font-size:12.5px;color:var(--muted);}
  .fut-card .left-info{flex:1;min-width:0;overflow:hidden;}
  .fut-card .left-info .fut-meta{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fut-card .right{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .fut-card .right .fut-date{display:block;line-height:1.2;opacity:.85;}

  .badge{
    font-size:11px; padding:4px 10px; border-radius:999px; font-weight:600;
    letter-spacing:.02em;
  }
  .badge.propre{background:rgba(74,160,106,.18);color:#8ee0a5;border:1px solid rgba(74,160,106,.3);}
  .badge.sale{background:rgba(194,90,72,.18);color:#f0998a;border:1px solid rgba(194,90,72,.3);}
  .badge.encours{background:rgba(214,166,63,.18);color:#f0c878;border:1px solid rgba(214,166,63,.3);}
  .badge.plein{background:rgba(77,146,184,.18);color:#7fc4f0;border:1px solid rgba(77,146,184,.3);}

  .empty{text-align:center;color:var(--muted);padding:44px 10px;font-size:14px;}

  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px) saturate(120%);
    display:flex;align-items:flex-start;justify-content:center;
    padding:30px 14px;z-index:50;overflow:auto;
    animation:fade-in .25s ease;
  }
  .modal{
    position:relative;
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--border);border-radius:18px;padding:24px;max-width:480px;width:100%;
    box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.03);
    animation:modal-in .35s var(--ease-out);
  }
  @keyframes modal-in{from{opacity:0;transform:translateY(12px) scale(.97);}to{opacity:1;transform:none;}}
  .modal h2{margin:0 0 6px;font-size:19px;padding-right:44px;font-weight:700;letter-spacing:-0.01em;}
  .modal .close{display:none!important;}
  .modal-global-close{position:fixed;top:max(10px, env(safe-area-inset-top));right:max(10px, env(safe-area-inset-right));
    z-index:2147483647;width:60px;height:60px;padding:0;border-radius:50%;font-size:26px;line-height:1;
    background:rgba(0,0,0,.65);color:#fff;border:1px solid rgba(255,255,255,.28);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 12px 30px rgba(0,0,0,.5);
    backdrop-filter:blur(10px);
    -webkit-tap-highlight-color:rgba(255,255,255,.22);touch-action:none;pointer-events:auto;transform:translateZ(0);-webkit-transform:translateZ(0);
    transition: background .2s, transform .15s;}
  .modal-global-close:hover{background:rgba(0,0,0,.8);transform:scale(1.05);}
  .modal-global-close[hidden]{display:none!important;}

  .live-scan-back{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);
    color:var(--text);padding:10px 14px;border-radius:11px;font-size:13px;margin-top:10px;cursor:pointer;position:relative;z-index:5;}
  .live-scan-back:hover{background:var(--panel3);border-color:var(--border-strong);}

  .hist{max-height:180px;overflow:auto;margin-top:6px;border:1px solid var(--border);border-radius:12px;background:var(--panel2);}
  .hist-item{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12.5px;transition:background .15s;}
  .hist-item:hover{background:var(--panel3);}
  .hist-item:last-child{border-bottom:none;}
  .hist-item .h-top{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-bottom:2px;}

  .qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .qr-card{background:#fff;color:#111;border-radius:12px;padding:16px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.35);}
  .qr-card > div:first-child{max-width:260px;margin:0 auto;}
  .qr-card canvas{image-rendering:pixelated;display:block;width:100%;height:auto;}
  .qr-card .id{font-weight:700;margin-top:10px;font-size:13px;}

  @media (max-width:480px){
    .qr-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
    .qr-card{padding:10px;}
    .qr-card > div:first-child{max-width:100%;}
  }
  .status-btns{display:flex;gap:6px;margin-top:6px;}
  .status-btns button{flex:1;font-size:12px;padding:9px 6px;}

  @media print{
    .topbar,.search-panel,h1,.sub,.no-print{display:none!important;}
    body{background:#fff;color:#000;}
    .app{max-width:none;padding:0;}
    .qr-card{break-inside:avoid;border:1px solid #ccc;}
  }
  @media (max-width: 480px){
    .app{padding:16px;}
    h1{font-size:20px;}
    .panel{padding:16px;}
    .modal{padding:18px;max-width:100%;border-radius:16px;}
    button{padding:11px 13px;font-size:13px;}
    .fut-id{font-size:14px;}
  }
  @media (min-width: 481px) and (max-width: 900px){
    .app{max-width:680px;}
  }
  @media (min-width: 901px){
    .app{max-width:900px;}
    .fut-card{padding:15px 18px;}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
  }

/* ===== Améliorations UX mobile / Apple / Android (ajout Lovable) ===== */
html, body { overscroll-behavior-y: contain; -webkit-text-size-adjust: 100%; width:100%; min-height:100%; }
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); min-height:100dvh; }
.app { padding-left: max(22px, env(safe-area-inset-left)); padding-right: max(22px, env(safe-area-inset-right)); }
* { -webkit-tap-highlight-color: transparent; }
button, .scan-capture-btn, a, [role="button"] { touch-action: manipulation; }
button, .scan-capture-btn { min-height: 44px; }
input, select, textarea { font-size: 16px; } /* évite le zoom auto iOS */
.live-scan-wrap video { transform: translateZ(0); } /* force compo GPU iOS */
.overlay { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
</style>

<script>
const STORAGE_KEY = 'futs';
let FUTS = {};
let me = '';
let view = 'list';
let filterStatus = 'tous';
let searchTerm = '';

const STATUS_LABELS = {sale:'Sale', propre:'Propre', plein:'Plein', encours:'Client'};

function baseUrl(){
  return location.origin + location.pathname;
}

async function loadMe(){
  me = '';
}

async function loadFuts(){
  try{
    const { doc, getDoc, db } = window.__fb;
    const snap = await getDoc(doc(db, "brasserie", "futs"));
    FUTS = snap.exists() ? (snap.data().data ? JSON.parse(snap.data().data) : {}) : {};
  }catch(e){
    console.error('Erreur de chargement', e);
    FUTS = {};
  }
}

async function saveFuts(){
  try{
    const { doc, setDoc, db } = window.__fb;
    await setDoc(doc(db, "brasserie", "futs"), { data: JSON.stringify(FUTS) });
  }catch(e){
    console.error('Erreur de sauvegarde', e);
  }
}

function listenFuts(){
  const { doc, onSnapshot, db } = window.__fb;
  onSnapshot(doc(db, "brasserie", "futs"), (snap) => {
    if(snap.exists()){
      FUTS = snap.data().data ? JSON.parse(snap.data().data) : {};
      render();
    }
  });
}

function fmtDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('fr-FR') + ' ' + dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

function addHistory(fut, action){
  fut.historique = fut.historique || [];
  fut.historique.unshift({date:new Date().toISOString(), action, user: me || 'Anonyme'});
}

async function setStatus(id, status){
  const f = FUTS[id];
  f.status = status;
  f.dateMaj = new Date().toISOString();
  addHistory(f, `Statut → ${STATUS_LABELS[status]}`);
  if(status === 'sale'){
    const cleared = [];
    if(f.contenu){ cleared.push('nom'); f.contenu = ''; }
    if(f.type){ cleared.push('type'); f.type = ''; }
    if(f.ddm){ cleared.push('DDM'); f.ddm = ''; }
    if(f.degre){ cleared.push('degré'); f.degre = ''; }
    if(f.lot){ cleared.push('n° de lot'); f.lot = ''; }
    if(f.volume){ cleared.push('volume'); f.volume = ''; }
    if(cleared.length) addHistory(f, `Champs effacés (${cleared.join(', ')}) — fût sale`);
  }
  await saveFuts();
  render();
  openDetail(id);
}

async function saveDetail(id){
  const f = FUTS[id];
  const contenu = document.getElementById('f-contenu').value.trim();
  const type = document.getElementById('f-type').value.trim();
  const volume = document.getElementById('f-volume').value.trim();
  const degre = document.getElementById('f-degre').value.trim();
  const lot = document.getElementById('f-lot').value.trim();
  const ddm = document.getElementById('f-ddm').value.trim();
  const note = document.getElementById('f-note').value.trim();

  if(contenu !== f.contenu) addHistory(f, `Nom de la bière → ${contenu || '(vide)'}`);
  if(type !== (f.type||'')) addHistory(f, `Type → ${type || '(vide)'}`);
  if(volume !== (f.volume||'')) addHistory(f, `Volume → ${volume || '(vide)'} L`);
  if(degre !== (f.degre||'')) addHistory(f, `Taux → ${degre || '(vide)'} %`);
  if(lot !== (f.lot||'')) addHistory(f, `N° de lot → ${lot || '(vide)'}`);
  if(ddm !== (f.ddm||'')) addHistory(f, `DDM → ${ddm || '(vide)'}`);
  if(note) addHistory(f, `Note : ${note}`);

  f.contenu = contenu;
  f.type = type;
  f.volume = volume;
  f.degre = degre;
  f.lot = lot;
  f.ddm = ddm;
  f.dateMaj = new Date().toISOString();
  await saveFuts();
  closeModal();
  render();
}

function openNew(){
  setModalHtml(`
    <div class="overlay">
      <div class="modal">
        <button class="close" onclick="closeModal()" style="float:right">✕</button>
        <h2>Nouveau fût</h2>
        <label>Identifiant du fût (ex: 30-073)</label>
        <input id="new-fut-id" placeholder="30-073" autofocus>
        <div id="new-fut-error" style="color:#f0998a;font-size:12.5px;margin-top:6px;"></div>
        <div class="row" style="margin-top:14px">
          <button class="primary" onclick="confirmNewFut()">Créer</button>
        </div>
      </div>
    </div>
  `);
  setTimeout(() => document.getElementById('new-fut-id').focus(), 50);
  document.getElementById('new-fut-id').addEventListener('keydown', e => {
    if(e.key === 'Enter') confirmNewFut();
  });
}

async function confirmNewFut(){
  const input = document.getElementById('new-fut-id');
  const id = input.value.trim();
  const errEl = document.getElementById('new-fut-error');
  if(!id){ errEl.textContent = 'Entre un identifiant.'; return; }
  if(FUTS[id]){ errEl.textContent = 'Ce fût existe déjà.'; return; }
  FUTS[id] = {id, status:'propre', contenu:'', dateMaj:new Date().toISOString(), historique:[{date:new Date().toISOString(), action:'Fût créé', user: me||'Anonyme'}]};
  await saveFuts();
  closeModal();
  render();
}

function deleteFut(id){
  setModalHtml(`
    <div class="overlay">
      <div class="modal">
        <h2>Supprimer le fût ${escapeHtml(id)} ?</h2>
        <div class="sub">Cette action est définitive.</div>
        <div class="row" style="margin-top:14px">
          <button class="danger" onclick="reallyDeleteFut('${id}')">Oui, supprimer</button>
          <button onclick="openDetail('${id}')">Annuler</button>
        </div>
      </div>
    </div>
  `);
}

async function reallyDeleteFut(id){
  delete FUTS[id];
  await saveFuts();
  closeModal();
  render();
}

function closeModal(){
  const globalClose = document.getElementById('modalGlobalClose');
  if(globalClose) globalClose.hidden = true;
  const root = document.getElementById('modalRoot');
  if(root) root.innerHTML = '';
  stopLiveQrScan();

// Sécurité mobile : sur certains navigateurs, le flux vidéo ou une boucle de scan lourde
// peut avaler le clic classique. On ferme donc dès le pointer/touch en capture, avant la vidéo.
function handleModalCloseIntent(ev){
  const target = ev.target;
  if(!target || !target.closest) return;
  if(target.closest('#modalGlobalClose, .modal .close, .live-scan-back')){
    ev.preventDefault();
    ev.stopPropagation();
    closeModal();
  }
}
document.addEventListener('pointerdown', handleModalCloseIntent, {capture:true, passive:false});
document.addEventListener('touchstart', handleModalCloseIntent, {capture:true, passive:false});
document.addEventListener('keydown', (ev) => { if(ev.key === 'Escape') closeModal(); });

// Correction mobile : après une photo prise en paysage, certains navigateurs PWA
// gardent l'ancien viewport jusqu'au prochain vrai rafraîchissement. On force un
// recalcul léger à chaque retour de caméra/rotation pour que l'interface suive
// immédiatement la position du téléphone.
let _orientationRefreshTimer = null;
function refreshMobileOrientationLayout(){
  clearTimeout(_orientationRefreshTimer);
  _orientationRefreshTimer = setTimeout(() => {
    const vv = window.visualViewport;
    const h = Math.round((vv && vv.height) || window.innerHeight || document.documentElement.clientHeight || 0);
    const w = Math.round((vv && vv.width) || window.innerWidth || document.documentElement.clientWidth || 0);
    if(h) document.documentElement.style.setProperty('--app-vh', (h * 0.01) + 'px');
    if(w) document.documentElement.style.setProperty('--app-vw', (w * 0.01) + 'px');
    document.documentElement.classList.toggle('is-landscape', w > h);
    document.documentElement.classList.toggle('is-portrait', h >= w);
    // Force un repaint sans déplacement visible (utile au retour de l'appareil photo iOS/Android).
    document.body.style.transform = 'translateZ(0)';
    requestAnimationFrame(() => { document.body.style.transform = ''; });
  }, 80);
}
['orientationchange','resize','pageshow','focus'].forEach(evt => window.addEventListener(evt, refreshMobileOrientationLayout, {passive:true}));
if(window.visualViewport) window.visualViewport.addEventListener('resize', refreshMobileOrientationLayout, {passive:true});
document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') refreshMobileOrientationLayout(); });
try{ if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); }catch(e){}
refreshMobileOrientationLayout();

function showToast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 320); }, 4200);
}

const _scanLibs = {};
function loadScript(src){
  if(_scanLibs[src]) return _scanLibs[src];
  const p = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Échec de chargement : ' + src));
    document.head.appendChild(s);
  });
  // Si le chargement échoue (réseau coupé, CDN bloqué…), on retire l'entrée du cache
  // pour que le prochain essai (bouton "Réessayer") reparte de zéro au lieu d'échouer
  // instantanément pour toujours.
  p.catch(() => { if(_scanLibs[src] === p) delete _scanLibs[src]; });
  _scanLibs[src] = p;
  return p;
}

// Native BarcodeDetector (Android Chrome, iOS 17+ Safari) is dramatically more
// reliable than jsQR — we use it as the primary reader and fall back to jsQR.
let _bdInstance = null;
let _bdChecked = false;
let _bdPromise = null;
async function getBarcodeDetector(){
  if(_bdChecked) return _bdInstance;
  if(_bdPromise) return _bdPromise;
  _bdPromise = (async () => {
    try{
      if('BarcodeDetector' in window){
        const formats = await window.BarcodeDetector.getSupportedFormats();
        if(formats && formats.indexOf('qr_code') !== -1){
          _bdInstance = new window.BarcodeDetector({formats:['qr_code']});
        }
      }
      // Polyfill ZXing WASM pour iPad / iOS Safari et anciens navigateurs :
      // beaucoup plus fiable que jsQR sur les caméras iOS.
      if(!_bdInstance){
        try{
          const mod = await import('https://cdn.jsdelivr.net/npm/barcode-detector@2.3.1/dist/es/pure.min.js');
          const BD = (mod && (mod.BarcodeDetector || (mod.default && mod.default.BarcodeDetector))) || null;
          if(BD){
            const formats = await BD.getSupportedFormats();
            if(formats && formats.indexOf('qr_code') !== -1){
              _bdInstance = new BD({formats:['qr_code']});
            }
          }
        }catch(e){ /* on gardera jsQR comme filet de sécurité */ }
      }
    }catch(e){ _bdInstance = null; }
    _bdChecked = true;
    return _bdInstance;
  })();
  return _bdPromise;
}

function getReadyBarcodeDetector(){
  if(_bdChecked) return _bdInstance;
  getBarcodeDetector().catch(() => null);
  return null;
}

function ensureJsQR(){
  return loadScript('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js').then(() => {
    if(typeof jsQR !== 'function') throw new Error('La librairie de lecture QR ne s\'est pas chargée correctement.');
  });
}

let _zxingPromise = null;
let _zxingReader = null;
async function ensureZXing(){
  if(_zxingReader) return _zxingReader;
  if(_zxingPromise) return _zxingPromise;
  _zxingPromise = import('https://cdn.jsdelivr.net/npm/@sec-ant/zxing-wasm@2.2.0/reader/+esm').then(mod => {
    const read = mod.readBarcodesFromImageData || mod.readBarcodes;
    if(typeof read !== 'function') throw new Error('Moteur QR ZXing indisponible.');
    _zxingReader = async (imageData) => {
      const results = await read(imageData, {tryHarder:true, formats:['QRCode','MicroQRCode'], maxSymbols:3});
      const found = (results || []).find(r => r && (r.text || r.rawValue));
      return found ? {data: found.text || found.rawValue, source:'zxing'} : null;
    };
    return _zxingReader;
  }).catch(err => { _zxingPromise = null; throw err; });
  return _zxingPromise;
}

const TESS_VERSION = '5.1.1';
function ensureTesseract(){
  return loadScript(`https://cdn.jsdelivr.net/npm/tesseract.js@${TESS_VERSION}/dist/tesseract.min.js`).then(() => {
    if(typeof Tesseract === 'undefined') throw new Error('La librairie de lecture de texte ne s\'est pas chargée correctement.');
  });
}

function withTimeout(promise, ms, label){
  let t;
  const timeout = new Promise((_, reject) => { t = setTimeout(() => reject(new Error(`${label} : délai dépassé (connexion trop lente ou bloquée).`)), ms); });
  return Promise.race([promise, timeout]).finally(() => clearTimeout(t));
}

function fileToImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => resolve({img, url});
    img.onerror = reject;
    img.src = url;
  });
}

// Extraction spécialisée pour les étiquettes de fûts : volume, nom de bière,
// degré, lot et DDM peuvent être sur la même ligne après OCR. On extrait donc
// d'abord les champs techniques, puis on nettoie chaque ligne pour reconstruire le nom.
// ============================================================================
// EXTRACTION DES ÉTIQUETTES DE FÛTS
// ============================================================================
// Le modèle d'étiquette utilisé est TOUJOURS le même :
//   Vol :<volume> L   Nom :<nom de la bière>
//   Type : <style>
//   Taux : <degré> %
//   Lot : <code lot>
//   DDM : <jj/mm/aa>
// Seules les VALEURS changent d'un fût à l'autre, jamais la disposition ni les
// libellés. On exploite donc ce format fixe : chaque champ est repéré par son
// libellé exact (tolérant aux confusions OCR habituelles O/0, I/1, etc.), et sa
// valeur s'arrête dès que le libellé suivant apparaît (les deux premiers champs,
// Vol et Nom, sont souvent sur la même ligne physique de l'étiquette).
// C'est beaucoup plus fiable qu'une reconnaissance "à l'aveugle" : on sait
// exactement où chercher chaque information.
//
// Un mode de secours plus générique (parseLabelTextGeneric) reste disponible
// au cas où une étiquette d'un format différent serait scannée un jour ; il ne
// sert que pour les champs que le mode "format fixe" n'aurait pas trouvés.
// ============================================================================

// Libellés attendus, avec les variantes de lecture OCR les plus fréquentes pour
// chacun (confusions O/0, I/1/l, ajout/perte d'espace, etc.). L'ordre de cet
// objet correspond à l'ordre réel des champs sur l'étiquette.
const FIXED_LABEL_VARIANTS = {
  vol:  ['vol', 'v0l', 'voi', 'v01', 'vol\\.'],
  nom:  ['nom', 'n0m', 'ncm', 'norn', 'nam'],
  type: ['type', 'tvpe', 'iype', 'typ'],
  taux: ['taux', 'tavx', 'iaux', 'tau x'],
  lot:  ['lot', 'l0t', 'iot', 'lct'],
  ddm:  ['ddm', 'd0m', 'odm', 'dcm', 'ddrn']
};
const FIXED_FIELD_ORDER = ['vol', 'nom', 'type', 'taux', 'lot', 'ddm'];

function buildFixedLabelRegex(variants){
  return '(?:' + variants.join('|') + ')';
}
const FIXED_ANY_LABEL = FIXED_FIELD_ORDER
  .map(k => buildFixedLabelRegex(FIXED_LABEL_VARIANTS[k]))
  .join('|');

// Corrige un code de lot lu par l'OCR : la première lettre est laissée telle
// quelle (sauf si l'OCR l'a clairement lue comme un chiffre), et les caractères
// suivants sont recalés vers des chiffres pour les confusions classiques
// (O/Q/D→0, I/L/|→1, S→5, B→8), car un lot est presque toujours "1 lettre + chiffres".
function normalizeLotToken(raw){
  let compact = (raw || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  if(!compact) return '';
  if(compact.length < 3 || compact.length > 14) return compact; // on garde tel quel si atypique
  let first = compact.charAt(0);
  let rest = compact.slice(1);
  if(/[0-9]/.test(first)){
    const digitToLetter = {'0':'O','1':'I','5':'S','8':'B'};
    first = digitToLetter[first] || first;
  }
  rest = rest.replace(/[OQD]/g, '0').replace(/[IL|]/g, '1').replace(/S/g, '5').replace(/B/g, '8');
  return first + rest;
}

// Extrait la valeur d'un champ donné à partir du texte OCR complet : cherche le
// libellé (avec ses variantes OCR tolérées), saute le séparateur (":" ou "-"
// éventuel), puis capture tout ce qui suit jusqu'au PROCHAIN libellé connu
// (même s'il est sur la même ligne physique, ex: "Vol :30 L Nom :Hooker") ou,
// à défaut, jusqu'à la fin de la ligne.
function extractFixedField(loose, key){
  const labelRe = new RegExp('\\b(?:' + buildFixedLabelRegex(FIXED_LABEL_VARIANTS[key]) + ')\\s*[:;=]?\\s*', 'i');
  const m = loose.match(labelRe);
  if(!m) return '';
  const afterLabel = loose.slice(m.index + m[0].length);
  const nextLabelRe = new RegExp('\\b(?:' + FIXED_ANY_LABEL + ')\\s*[:;=]?', 'i');
  const nl = afterLabel.match(nextLabelRe);
  const endOfLine = afterLabel.indexOf('\n');
  let cutAt = afterLabel.length;
  if(nl) cutAt = Math.min(cutAt, nl.index);
  if(endOfLine >= 0) cutAt = Math.min(cutAt, endOfLine);
  return afterLabel.slice(0, cutAt).replace(/\s{2,}/g, ' ').trim();
}

// Normalise les confusions OCR générales (O<->0, barre verticale <->1, %) AVANT
// toute extraction, exactement comme pour le mode générique : indispensable pour
// que "3O L" soit bien lu comme "30 L", etc.
function normalizeOcrGlobal(text){
  return (text || '')
    .replace(/\r/g, '')
    .replace(/[’‘]/g, "'")
    .replace(/[|]/g, '1')
    .replace(/([0-9])\s*[oO]\s*([0-9])/g, '$10$2')
    .replace(/([0-9])\s*[oO]\b/g, '$10')
    .replace(/\b[oO]\s*([0-9])/g, '0$1')
    .replace(/([0-9])[oO](?=[Ll](?:itres?|tr)?\b)/g, '$10')
    .replace(/°\/°|°\/o|o\/o/gi, '%')
    .replace(/(^|\D)0\/0($|\D)/gi, '$1%$2');
}

// Extraction dédiée au format d'étiquette fixe (Vol / Nom / Type / Taux / Lot / DDM).
// Retourne un objet partiel : seuls les champs effectivement trouvés sont renseignés,
// pour permettre à parseLabelText de les compléter au besoin avec le mode générique.
function parseLabelTextFixedFormat(raw){
  const loose = normalizeOcrGlobal(raw);
  const out = {contenu:'', volume:'', degre:'', lot:'', ddm:'', type:''};

  // --- Volume : nombre de litres juste après le libellé "Vol". ---
  const volRaw = extractFixedField(loose, 'vol');
  if(volRaw){
    const volMatch = volRaw.match(/(\d{1,3})/);
    if(volMatch){
      const n = parseInt(volMatch[1], 10);
      if(n >= 1 && n <= 200) out.volume = String(n);
    }
  }

  // --- Nom de la bière : tout ce qui suit "Nom", nettoyé des symboles parasites. ---
  const nomRaw = extractFixedField(loose, 'nom');
  if(nomRaw){
    let s = nomRaw.replace(/[^\p{L}\p{N}'’\-\s]/gu, ' ').replace(/\s{2,}/g, ' ').trim();
    if(s && /[A-Za-zÀ-ÿ]{2,}/.test(s)) out.contenu = s;
  }

  // --- Type / style : tout ce qui suit "Type". ---
  const typeRaw = extractFixedField(loose, 'type');
  if(typeRaw){
    let s = typeRaw.replace(/[^\p{L}\p{N}'’\-\s]/gu, ' ').replace(/\s{2,}/g, ' ').trim();
    if(s && /[A-Za-zÀ-ÿ]{2,}/.test(s)) out.type = s;
  }

  // --- Taux d'alcool : premier nombre décimal (virgule ou point) après "Taux". ---
  const tauxRaw = extractFixedField(loose, 'taux');
  if(tauxRaw){
    const tauxMatch = tauxRaw.match(/(\d{1,2})(?:[,.](\d{1,2}))?/);
    if(tauxMatch){
      const whole = parseInt(tauxMatch[1], 10);
      if(whole >= 0 && whole <= 20){
        out.degre = tauxMatch[2] ? `${whole},${tauxMatch[2]}` : String(whole);
      }
    }
  }

  // --- Lot : code alphanumérique après "Lot", corrigé des confusions OCR. ---
  const lotRaw = extractFixedField(loose, 'lot');
  if(lotRaw){
    const lot = normalizeLotToken(lotRaw);
    if(lot && lot.length >= 3) out.lot = lot;
  }

  // --- DDM : date jj/mm/aa(aa) après "DDM". ---
  const ddmRaw = extractFixedField(loose, 'ddm');
  if(ddmRaw){
    const dateMatch = ddmRaw.match(/(\d{1,2})\s*[\/\.\-]\s*(\d{1,2})\s*[\/\.\-]\s*(\d{2,4})/);
    if(dateMatch){
      const day = dateMatch[1].padStart(2, '0');
      const month = dateMatch[2].padStart(2, '0');
      let year = dateMatch[3];
      if(year.length === 4) year = year.slice(2);
      const d = parseInt(day, 10), mo = parseInt(month, 10);
      if(mo >= 1 && mo <= 12 && d >= 1 && d <= 31) out.ddm = `${day}/${month}/${year}`;
    }
  }

  return out;
}

// Extraction spécialisée pour les étiquettes de fûts : volume, nom de bière,
// degré, lot et DDM peuvent être sur la même ligne après OCR. On extrait donc
// d'abord les champs techniques, puis on nettoie chaque ligne pour reconstruire le nom.
function parseLabelTextGeneric(raw){
  const text = (raw || '').replace(/\r/g, '').replace(/[’‘]/g, "'");

  // IMPORTANT : ces corrections de confusions OCR (O<->0, I/l/|<->1, °/° <-> %) doivent
  // être appliquées AVANT toute extraction de champ technique (volume, taux, date,
  // résidu de type/nom). Sinon un simple "Vol : 3O L" (O au lieu de 0) fait échouer la
  // détection du volume ET laisse un résidu ("OL") qui se retrouve ensuite mal recasé
  // dans le champ Type. On construit donc "loose" en premier et on en dérive toutes
  // les lignes de travail (lines) et l'extraction par libellé (labeledValue).
  const loose = text
    .replace(/[|]/g, '1')
    .replace(/([0-9])\s*[oO]\s*([0-9])/g, '$10$2')
    .replace(/([0-9])\s*[oO]\b/g, '$10')
    .replace(/\b[oO]\s*([0-9])/g, '0$1')
    // Cas particulier : le "0" mal reconnu en "O" est parfois collé directement à
    // l'unité de volume sans espace ("1OL", "3OL") — aucun des trois remplacements
    // ci-dessus ne matche alors (pas de frontière entre O et L). On le traite à part.
    .replace(/([0-9])[oO](?=[Ll](?:itres?|tr)?\b)/g, '$10')
    .replace(/°\/°|°\/o|o\/o/gi, '%')
    .replace(/(^|\D)0\/0($|\D)/gi, '$1%$2');

  const lines = loose.split('\n').map(l => l.replace(/[-–—]{3,}/g, ' ').trim()).filter(Boolean);
  const result = {contenu:'', volume:'', degre:'', lot:'', ddm:'', type:''};

  const normalizeSpaces = (v) => (v || '').replace(/\s{2,}/g, ' ').trim();
  const safeLine = (v) => normalizeSpaces((v || '').replace(/[“”]/g, '"').replace(/[;]+/g, ' '));

  // Liste de tous les libellés de champs connus : sert à couper proprement la valeur
  // d'un champ dès qu'un autre libellé démarre sur la même ligne. C'est fréquent car
  // l'OCR fusionne parfois deux colonnes de l'étiquette sur une seule ligne de texte
  // (ex: "Vol :30 L Nom :Lougre" ou "Type : Sarrasin oignons Taux : 5,2 %").
  const FIELD_LABEL_PATTERN = '(?:volume|vol\\.?|contenance|capacity|(?:nom|non)(?:\\s+de\\s+la\\s+bi[eè]re)?|bi[eè]re|beer|produit|product|name|type|style|genre|cat[ée]gorie|taux(?:\\s+d[\'’]?alcool)?|degr[ée]?|alcool|alc\\.?|abv|titre alcoom[eé]trique|n[°o]?\\s*(?:de\\s*)?lot|lot|batch|ddm|dlc|dluo|consommer|exp(?:iration)?|meilleur avant|best before|use by|bbd)';

  const labeledValue = (labels, maxChars) => {
    const label = labels.join('|');
    const re = new RegExp('(?:^|\\n|\\b)(?:' + label + ')\\s*(?:[:#\\-–—]|=)?\\s*([^\\n]{1,' + (maxChars || 80) + '})', 'i');
    const m = loose.match(re);
    if(!m) return '';
    let val = m[1];
    const nextLabelRe = new RegExp('\\s+' + FIELD_LABEL_PATTERN + '\\s*[:#\\-–—=]', 'i');
    const cut = val.search(nextLabelRe);
    if(cut > 0) val = val.slice(0, cut);
    return safeLine(val);
  };

  const normalizeLotTokenGeneric = (token) => {
    if(!token) return '';
    let compact = token.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if(compact.length < 4 || compact.length > 14) return '';
    // Cas très courant : une lettre puis des chiffres, avec confusions OCR O/0, I/1, S/5…
    if(/^[A-Z0OQ][A-Z0-9OQDIL|SB]{3,12}$/.test(compact)){
      const prefix = compact.charAt(0).replace(/[0OQ]/, 'O');
      let tail = compact.slice(1)
        .replace(/[OQD]/g, '0')
        .replace(/[IL|]/g, '1')
        .replace(/S/g, '5')
        .replace(/B/g, '8');
      if(/^\d{3,10}$/.test(tail)){
        if(tail.length === 6 && /^0{4}\d{2}$/.test(tail)) tail = tail.slice(1);
        return prefix + tail;
      }
    }
    // Sinon on garde un lot alphanumérique explicite, mais jamais un mot banal.
    if(/\d/.test(compact) && /[A-Z]/.test(compact) && !/^(BIERE|BEER|DDM|DLC|VOLUME|ALCOOL|LOT)$/.test(compact)) return compact;
    return '';
  };

  // Volume : libellés explicites d'abord, puis formats usuels 20L / 30 L / 3300cl.
  const volumeText = labeledValue(['volume', 'vol\\.?', 'contenance', 'capacity'], 30) || loose;
  const volumeMatches = [...volumeText.matchAll(/\b(\d{1,3})\s*(?:litres?|ltr|l|[iI1])\s*\.?\s*(?=$|\s|[.,;:])/gi)];
  for(const m of volumeMatches){
    const n = parseInt(m[1], 10);
    if(n >= 2 && n <= 80){ result.volume = String(n); break; }
  }
  if(!result.volume){
    const clMatch = volumeText.match(/\b(\d{3,5})\s*cl\b/i);
    if(clMatch){
      const n = Math.round(parseInt(clMatch[1], 10) / 100);
      if(n >= 2 && n <= 80) result.volume = String(n);
    }
  }

  // Degré : accepte 4,7 %, 4.7% vol, ABV 5%, Alc 5° — sans prendre une date pour un degré.
  const degreeText = labeledValue(['taux(?:\\s+d[\'’]?alcool)?', 'degr[ée]?', 'alcool', 'alc\\.?', 'abv', 'titre alcoom[eé]trique'], 40) || loose;
  const degMatches = [...degreeText.matchAll(/\b(\d{1,2})(?:\s*[,.]\s*(\d{1,2}))?\s*(?:%|°|vol\b|alc\b|abv\b)/gi)];
  for(const m of degMatches){
    const whole = parseInt(m[1], 10), decRaw = m[2];
    const dec = decRaw == null ? 0 : parseInt(decRaw, 10);
    if(whole >= 0 && whole <= 20 && dec >= 0){
      result.degre = decRaw == null ? String(whole) : `${whole},${String(dec).padEnd(1, '0')}`;
      break;
    }
  }

  // Lot : uniquement si le contexte ressemble vraiment à un lot, puis fallback prudent.
  const lotCandidates = [];
  const explicitLot = loose.match(/(?:n[°o]?\s*(?:de\s*)?lot|lot|batch|lot\s*no|batch\s*no)\s*[:#\-–—]?\s*([A-Z0-9][A-Z0-9\-]{2,18})/i);
  if(explicitLot) lotCandidates.push(explicitLot[1]);
  for(const line of lines){
    if(/\b(lot|batch|n[°o])\b/i.test(line)) lotCandidates.push(line.replace(/.*?\b(?:lot|batch|n[°o]?)(?:\s*de\s*lot)?\b\s*[:#\-–—]?/i, ''));
  }
  for(const m of loose.matchAll(/\b([A-Z])\s*([OQD0-9IL|SB]{4,8})\b/g)) lotCandidates.push(m[1] + m[2]);
  for(const candidate of lotCandidates){
    const lot = normalizeLotTokenGeneric(candidate);
    if(lot){ result.lot = lot; break; }
  }

  // DDM / DLC : dates jj/mm/aa(aa), jj.mm.aa(aa), jj-mm-aa(aa), ou mm/aaaa si explicite.
  const dateRegex = /(\d{1,2})[\/\.\-\s](\d{1,2})[\/\.\-\s](\d{2,4})/g;
  let dateMatch, bestDate = null, bestScore = -1;
  const ddmContext = /(DDM|DLC|DLUO|consommer|exp|expiration|meilleur avant|best before|use by|bbd)/i;
  while((dateMatch = dateRegex.exec(loose)) !== null){
    let day = dateMatch[1].padStart(2, '0'), month = dateMatch[2].padStart(2, '0'), year = dateMatch[3];
    if(year.length === 4) year = year.slice(2);
    const d = parseInt(day,10), mo = parseInt(month,10), y = parseInt(year,10);
    if(mo < 1 || mo > 12 || d < 1 || d > 31 || y < 20 || y > 50) continue;
    const before = loose.slice(Math.max(0, dateMatch.index - 45), dateMatch.index);
    const after = loose.slice(dateMatch.index, dateMatch.index + 45);
    const candidate = `${day}/${month}/${year}`;
    const score = ddmContext.test(before + after) ? 10 : (y >= 24 ? 2 : 1);
    if(score > bestScore){ bestScore = score; bestDate = candidate; }
  }
  if(!bestDate){
    const monthYear = loose.match(/(?:DDM|DLC|DLUO|exp|best before|meilleur avant|bbd)\D{0,12}(\d{1,2})[\/\.\-\s](20\d{2}|\d{2})/i);
    if(monthYear){
      let mo = monthYear[1].padStart(2, '0'), year = monthYear[2];
      if(year.length === 4) year = year.slice(2);
      if(parseInt(mo,10) >= 1 && parseInt(mo,10) <= 12) bestDate = `01/${mo}/${year}`;
    }
  }
  if(bestDate) result.ddm = bestDate;

  const stripTechnicalFields = (value) => {
    let s = ` ${value || ''} `;
    s = s.replace(/[-–—]{3,}/g, ' ');
    s = s.replace(/\b\d{1,3}\s*(?:litres?|ltr|l|[iI1])\s*\.?\s*(?=$|\s|[.,;:])/gi, ' ');
    s = s.replace(/\b\d{3,5}\s*cl\b/gi, ' ');
    s = s.replace(/\b(?:taux(?:\s+d[\'’]?alcool)?|alc(?:ool)?|degr[ée]?|abv|vol(?:ume)?)\s*[:#\-]?\s*\d{1,2}(?:\s*[,.]\s*\d{1,2})?\s*(?:%|°|vol)?/gi, ' ');
    s = s.replace(/\b\d{1,2}\s*[,.]\s*\d{1,2}\s*(?:%|°|vol|alc|abv)\b/gi, ' ');
    s = s.replace(/\b(?:type|style|genre|cat[ée]gorie)\s*[:#\-=]?\s*[^\n]{2,60}/gi, ' ');
    s = s.replace(/\b(?:ddm|dlc|dluo|exp(?:iration)?|bbd|best before|meilleur avant)\s*[:#\-]?\s*\d{1,2}[\/\.\-\s]\d{1,2}[\/\.\-\s]\d{2,4}\b/gi, ' ');
    s = s.replace(/\b\d{1,2}[\/\.\-\s]\d{1,2}[\/\.\-\s]\d{2,4}\b/g, ' ');
    s = s.replace(/\b(?:n[°o]?\s*(?:de\s*)?lot|lot|batch|lot no|batch no)\s*[:#\-]?\s*[A-Z0-9]?[A-Z0-9OQDIL|SB\s\-\/]{3,18}\b/gi, ' ');
    s = s.replace(/\b[WLNBF]\s*[OQD0-9IL|SB]{4,9}\b/gi, ' ');
    s = s.replace(/\b(?:volume|contenance|capacity|degr[ée]?|alcool|alc|abv|vol|lot|batch|ddm|dlc|dluo|bbd|n[°o]?\s*(?:de\s*)?lot|consommer|meilleur avant|exp(?:iration)?|(?:nom|non)(?:\s+de\s+la\s+bi[eè]re)?|bi[eè]re|beer|produit|product|name)\b\s*[:#\-=]?/gi, ' ');
    return s;
  };

  // Type (style de bière) : uniquement via un libellé explicite ("Type", "Style", "Genre",
  // "Catégorie"), car sans libellé il est impossible de le distinguer fiablement du nom de
  // la bière. On nettoie ensuite avec stripTechnicalFields au cas où l'OCR aurait fusionné
  // le champ suivant (Taux, Lot, DDM…) sur la même ligne sans que la coupe automatique de
  // labeledValue ait pu s'en apercevoir (ex: libellé suivant sans ":" après lui).
  const cleanTypeCandidate = (value) => {
    let s = stripTechnicalFields(safeLine(value || ''));
    s = s.replace(/https?:\/\/\S+/gi, ' ');
    s = s.replace(/[^\p{L}\p{N}'\- ]/gu, ' ');
    s = s.replace(/\s{2,}/g, ' ').trim();
    if(!/[A-Za-zÀ-ÿ]{2,}/.test(s)) return '';
    if(/^(?:type|style|genre|cat[ée]gorie)$/i.test(s)) return '';
    if(s.length < 2 || s.length > 60) return '';
    return s;
  };
  const explicitType = labeledValue(['type', 'style', 'genre', 'cat[ée]gorie'], 60);
  if(explicitType) result.type = cleanTypeCandidate(explicitType);

  const explicitName = labeledValue(['(?:nom|non)(?:\s+de\s+la\s+bi[eè]re)?', 'bi[eè]re', 'beer', 'produit', 'product', 'name'], 90);

  const cleanNameCandidate = (line) => {
    let s = stripTechnicalFields(line);
    s = s.replace(/https?:\/\/\S+/gi, ' ');
    s = s.replace(/[^\p{L}\p{N}'\- ]/gu, ' ');
    s = s.replace(/\s{2,}/g, ' ').trim();
    s = s.replace(/^(?:[a-z]{1,2}|[iI1|])\s+(?=[A-ZÀ-Ý])/u, '');
    if(!/[A-Za-zÀ-ÿ]{3,}/.test(s)) return '';
    if(/^(?:l|litr|litre|cl|ddm|lot|vol|alc|alcool|degre|degré|abv|batch|date|brass[eé]e?)$/i.test(s)) return '';
    if(s.length < 3 || s.length > 90) return '';
    return s;
  };

  const scoreName = (text) => {
    if(!text) return 0;
    let score = 0;
    if(/[A-ZÀ-Ý][a-zà-ÿ]/.test(text)) score += 2;
    if(/\b(ipa|pale ale|lager|stout|porter|blonde|brune|ambr[eé]e|saison|weizen|pils|ale|bock|tripel|neipa|sour|gose)\b/i.test(text)) score += 4;
    const words = text.split(/\s+/).filter(Boolean);
    if(words.length >= 2) score += 2;
    if(words.length >= 3) score += 1;
    if(/\d/.test(text)) score -= 1;
    if(/\b(brasserie|brewery|ingredients?|eau|malt|houblon|levure|adresse|www|instagram|facebook)\b/i.test(text)) score -= 4;
    return score;
  };

  // Certains noms de bière sont coupés sur deux lignes par l'OCR (ex: "La Chouffe" / "Blonde").
  // On construit donc des groupes de lignes consécutives qui ressemblent toutes à du nom,
  // et on garde le meilleur groupe plutôt qu'une seule ligne isolée.
  // Important : on exclut toute ligne qui correspond déjà à la valeur du champ Type,
  // sinon celui-ci se retrouve dupliqué à la fin du nom (ex: "Lougre Sarrasin oignons"
  // alors que "Sarrasin oignons" est déjà le Type).
  const typeLower = (result.type || '').toLowerCase();
  const isTypeDuplicate = (line) => {
    if(!typeLower) return false;
    const c = cleanNameCandidate(line);
    return !!c && c.toLowerCase() === typeLower;
  };
  const nameIndices = [];
  for(let i = 0; i < lines.length; i++){
    if(cleanNameCandidate(lines[i]) && !isTypeDuplicate(lines[i])) nameIndices.push(i);
  }
  const nameGroups = [];
  let start = 0;
  while(start < nameIndices.length){
    let end = start;
    while(end + 1 < nameIndices.length && nameIndices[end + 1] === nameIndices[end] + 1) end++;
    const group = nameIndices.slice(start, end + 1).map(i => lines[i]);
    nameGroups.push({group, start, end});
    start = end + 1;
  }

  const scored = [];
  if(explicitName){
    // Élargit le nom explicite avec les lignes voisines si elles forment un nom cohérent.
    const base = explicitName;
    let bestExtended = base;
    let bestScore = scoreName(base);
    const explicitIdx = lines.findIndex(l => l.toLowerCase().includes(base.toLowerCase().split(' ')[0]));
    let bestEnd = explicitIdx;
    if(explicitIdx >= 0){
      for(let len = 2; len <= 4 && explicitIdx + len - 1 < lines.length; len++){
        if(isTypeDuplicate(lines[explicitIdx + len - 1])) break;
        const merged = cleanNameCandidate(lines.slice(explicitIdx, explicitIdx + len).join(' '));
        if(merged){
          const sc = scoreName(merged) + 2; // bonus explicite
          if(sc > bestScore){ bestScore = sc; bestExtended = merged; bestEnd = explicitIdx + len - 1; }
        }
      }
    }
    const usedIndices = explicitIdx >= 0 ? Array.from({length: bestEnd - explicitIdx + 1}, (_, k) => explicitIdx + k) : [];
    scored.push({text:bestExtended, score:bestScore, end:bestEnd, used:usedIndices});
  }
  for(const {group, start} of nameGroups){
    const STYLE_KEYWORDS_RE = /\b(ipa|pale ale|lager|stout|porter|blonde|brune|ambr[eé]e|saison|weizen|pils|ale|bock|tripel|neipa|sour|gose)\b/i;
    for(let len = 1; len <= 4 && len <= group.length; len++){
      const merged = cleanNameCandidate(group.slice(0, len).join(' '));
      if(!merged) continue;
      // Sans mot-clé de style reconnu, on évite de fusionner plusieurs lignes dans le Nom :
      // le plus souvent la ligne suivante est en fait le Type, pas la suite du nom.
      if(len > 1 && !STYLE_KEYWORDS_RE.test(merged)) continue;
      const usedIndices = nameIndices.slice(start, start + len);
      scored.push({text:merged, score:scoreName(merged) + (len > 1 ? 3 : 0), end:nameIndices[start + len - 1], used:usedIndices});
    }
  }
  for(let i = 0; i < lines.length; i++){
    if(isTypeDuplicate(lines[i])) continue;
    const c = cleanNameCandidate(lines[i]);
    if(c) scored.push({text:c, score:scoreName(c) + Math.max(0, 6 - i * 3), end:i, used:[i]});
  }
  scored.sort((a,b) => b.score - a.score || b.text.length - a.text.length);
  if(scored.length && scored[0].score >= 2){
    result.contenu = scored[0].text.replace(/\b([A-Za-zÀ-ÿ]{3,})\s+\1\b/gi, '$1').trim();

    // Repli Type : sur de nombreuses étiquettes, le style ("IPA", "Sarrasin oignons"…)
    // n'est pas précédé d'un libellé "Type :" — sans repli, le champ Type reste vide.
    if(!result.type){
      const BAD_TYPE_WORDS = /\b(brasserie|brewery|ingredients?|eau|malt|houblon|levure|adresse|www|instagram|facebook|http)\b/i;
      const contenuLower = result.contenu.toLowerCase();
      const usedSet = new Set(scored[0].used || []);
      const endIdx = scored[0].end;
      // 1) La ligne juste après le nom retenu, si elle n'a pas déjà été absorbée dans le nom.
      if(typeof endIdx === 'number' && endIdx >= 0 && endIdx + 1 < lines.length && !usedSet.has(endIdx + 1)){
        const nextLine = lines[endIdx + 1];
        if(!BAD_TYPE_WORDS.test(nextLine)){
          const candidate = cleanTypeCandidate(nextLine);
          if(candidate && candidate.toLowerCase() !== contenuLower && candidate.split(/\s+/).length <= 6 && !/\d/.test(candidate)){
            result.type = candidate;
          }
        }
      }
      // 2) Sinon, on cherche un mot-clé de style connu n'importe où dans le texte,
      // en ignorant les lignes déjà utilisées pour construire le nom.
      if(!result.type){
        for(let i = 0; i < lines.length; i++){
          if(usedSet.has(i)) continue;
          const line = lines[i];
          if(BAD_TYPE_WORDS.test(line)) continue;
          if(line.toLowerCase() === contenuLower) continue;
          if(/\b(ipa|pale ale|lager|stout|porter|blonde|brune|ambr[eé]e|saison|weizen|pils|ale|bock|tripel|neipa|sour|gose)\b/i.test(line)){
            const candidate = cleanTypeCandidate(line);
            if(candidate && candidate.toLowerCase() !== contenuLower){ result.type = candidate; break; }
          }
        }
      }
    }
  }
  return result;
}

// Point d'entrée principal : on tente d'abord l'extraction "format fixe" (fiable à
// 100% tant que l'étiquette suit le modèle Vol/Nom/Type/Taux/Lot/DDM), puis on
// complète uniquement les champs manquants avec le mode générique — utile si un
// jour une étiquette différente est scannée, sans jamais dégrader le cas normal.
function parseLabelText(raw){
  const fixed = parseLabelTextFixedFormat(raw);
  const fixedCount = Object.values(fixed).filter(Boolean).length;

  // Si le format fixe n'a quasiment rien trouvé, l'étiquette scannée ne correspond
  // probablement pas au modèle habituel : on se repose entièrement sur le mode générique.
  if(fixedCount === 0) return parseLabelTextGeneric(raw);

  const generic = parseLabelTextGeneric(raw);
  const merged = {contenu:'', volume:'', degre:'', lot:'', ddm:'', type:''};
  for(const key of Object.keys(merged)){
    merged[key] = fixed[key] || generic[key] || '';
  }
  return merged;
}


let _scanState = null;

function openScanFlow(){
  _scanState = {label:null, parsed:null};
  setModalHtml(`

        <h2>Scanner un fût</h2>

// ============================================================================
// ORIENTATION DE LA PHOTO
// ============================================================================
// On laisse le navigateur appliquer lui-même l'orientation EXIF de la photo,
// avec imageOrientation:'from-image'. Tous les navigateurs actuels (Chrome et
// Safari sur Android/iOS) le font correctement, aussi bien à l'affichage que
// quand on dessine l'image dans un <canvas> pour l'OCR.
// AVANT, le code lisait le tag EXIF lui-même puis appliquait la rotation à la
// main en plus : sur beaucoup de téléphones le navigateur avait DÉJÀ redressé
// l'image tout seul, donc cette rotation manuelle s'appliquait une seconde
// fois par-dessus — résultat : une photo prise bien droite en portrait
// ressortait pivotée en paysage, et inversement. On ne touche donc plus du
// tout à l'orientation nous-mêmes : une seule correction (celle du
// navigateur), plus jamais deux.
async function loadOrientedImage(file){
  const url = URL.createObjectURL(file);
  if(typeof createImageBitmap === 'function'){
    try{
      const bitmap = await createImageBitmap(file, {imageOrientation:'from-image'});
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width; canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d', {willReadFrequently:true});
      ctx.drawImage(bitmap, 0, 0);
      try{ bitmap.close && bitmap.close(); }catch(_){}
      return {source:canvas, width:canvas.width, height:canvas.height, url};
    }catch(_){ /* on tombe sur le chemin de secours ci-dessous */ }
  }
  // Chemin de secours (navigateurs très anciens sans createImageBitmap) : un
  // simple <img> respecte lui aussi l'orientation EXIF nativement.
  const img = await new Promise((resolve, reject) => {
    const el = new Image();
    el.onload = () => resolve(el);
    el.onerror = reject;
    el.src = url;
  });
  return {source:img, width:img.naturalWidth, height:img.naturalHeight, url};
}

// ===== PRÉTRAITEMENT IMAGE =====
// Pipeline optimisé : redimensionnement → débruitage + contraste via ctx.filter
// (accéléré par le navigateur) → correction de skew (photos main levée) →
// binarisation locale de Sauvola (bien meilleure qu'Otsu global sur photos
// d'étiquettes métal à éclairage inégal). Signature inchangée : renvoie
// [canvasGris, canvasBinaire] pour rester compatible avec runOcrWithFallback.

function _toGrayFloat(imgData){
  const d = imgData.data, n = imgData.width * imgData.height;
  const out = new Float32Array(n);
  for(let p=0,i=0;p<n;p++,i+=4){
    out[p] = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
  }
  return out;
}

function _grayToCanvas(gray, w, h){
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d', {willReadFrequently:true});
  const img = ctx.createImageData(w, h); const d = img.data;
  for(let p=0,i=0;p<w*h;p++,i+=4){
    let v = gray[p]; v = v<0?0:(v>255?255:v)|0;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

// Estime l'angle de skew par profil de projection : pour chaque angle testé,
// on projette la somme de pixels sombres par ligne, et on garde l'angle qui
// maximise la variance du profil (les lignes de texte deviennent alors des
// pics très marqués). Sous-échantillonne pour rester rapide (~30 ms).
function _estimateSkew(gray, w, h){
  const scale = Math.min(1, 400 / w);
  const sw = Math.max(64, Math.round(w * scale));
  const sh = Math.max(64, Math.round(h * scale));
  const small = new Float32Array(sw * sh);
  for(let y=0;y<sh;y++){
    const sy = Math.min(h-1, Math.floor(y / scale));
    for(let x=0;x<sw;x++){
      const sx = Math.min(w-1, Math.floor(x / scale));
      small[y*sw+x] = gray[sy*w+sx];
    }
  }
  let sum = 0; for(let i=0;i<small.length;i++) sum += small[i];
  const thr = sum / small.length;

  let bestAngle = 0, bestScore = -1;
  const cx = sw/2, cy = sh/2;
  for(let deg = -8; deg <= 8; deg += 0.5){
    const a = deg * Math.PI / 180;
    const cos = Math.cos(a), sin = Math.sin(a);
    const rows = new Float32Array(sh);
    for(let y=0;y<sh;y++){
      let cnt = 0;
      for(let x=0;x<sw;x++){
        const dx = x - cx, dy = y - cy;
        const rx = Math.round(cos*dx - sin*dy + cx);
        const ry = Math.round(sin*dx + cos*dy + cy);
        if(rx<0||rx>=sw||ry<0||ry>=sh) continue;
        if(small[ry*sw+rx] < thr) cnt++;
      }
      rows[y] = cnt;
    }
    let m = 0; for(let y=0;y<sh;y++) m += rows[y]; m /= sh;
    let v = 0; for(let y=0;y<sh;y++){ const d = rows[y]-m; v += d*d; }
    if(v > bestScore){ bestScore = v; bestAngle = deg; }
  }
  return bestAngle;
}

function _rotateCanvas(src, angleDeg){
  if(Math.abs(angleDeg) < 0.25) return src;
  const w = src.width, h = src.height;
  const a = angleDeg * Math.PI / 180;
  const cos = Math.abs(Math.cos(a)), sin = Math.abs(Math.sin(a));
  const nw = Math.round(w*cos + h*sin);
  const nh = Math.round(w*sin + h*cos);
  const c = document.createElement('canvas'); c.width = nw; c.height = nh;
  const ctx = c.getContext('2d', {willReadFrequently:true});
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,nw,nh);
  ctx.translate(nw/2, nh/2);
  ctx.rotate(a);
  ctx.drawImage(src, -w/2, -h/2);
  return c;
}

// Binarisation locale de Sauvola : seuil par pixel = m*(1 + k*((s/R)-1))
// où m = moyenne locale, s = écart-type local, R=128, k≈0.2.
// Beaucoup plus robuste qu'Otsu global sur photos à éclairage inégal
// (métal réfléchissant, ombres, coins sombres). O(1) par pixel grâce
// aux images intégrales (satellite areas).
function _sauvolaBinarize(gray, w, h, window, k){
  window = window || 25;
  k = (k == null) ? 0.2 : k;
  const R = 128;
  const r = window >> 1;
  const W1 = w + 1;
  const sat  = new Float64Array((h+1) * W1);
  const sat2 = new Float64Array((h+1) * W1);
  for(let y=1;y<=h;y++){
    let rowSum = 0, rowSum2 = 0;
    for(let x=1;x<=w;x++){
      const v = gray[(y-1)*w + (x-1)];
      rowSum += v; rowSum2 += v*v;
      sat [y*W1 + x] = sat [(y-1)*W1 + x] + rowSum;
      sat2[y*W1 + x] = sat2[(y-1)*W1 + x] + rowSum2;
    }
  }
  const out = new Uint8ClampedArray(w * h);
  for(let y=0;y<h;y++){
    const y0 = Math.max(0, y - r), y1 = Math.min(h-1, y + r);
    for(let x=0;x<w;x++){
      const x0 = Math.max(0, x - r), x1 = Math.min(w-1, x + r);
      const area = (y1 - y0 + 1) * (x1 - x0 + 1);
      const s  = sat [(y1+1)*W1 + (x1+1)] - sat [y0*W1 + (x1+1)] - sat [(y1+1)*W1 + x0] + sat [y0*W1 + x0];
      const s2 = sat2[(y1+1)*W1 + (x1+1)] - sat2[y0*W1 + (x1+1)] - sat2[(y1+1)*W1 + x0] + sat2[y0*W1 + x0];
      const m = s / area;
      const variance = Math.max(0, s2/area - m*m);
      const sd = Math.sqrt(variance);
      const t = m * (1 + k * (sd / R - 1));
      out[y*w + x] = gray[y*w + x] > t ? 255 : 0;
    }
  }
  return out;
}

function preprocessForOCR(source, srcWidth, srcHeight){
  // 1) Redimensionnement (compromis vitesse/qualité Tesseract).
  const maxDim = 1900, minDim = 1400;
  let w = srcWidth || source.naturalWidth || source.width;
  let h = srcHeight || source.naturalHeight || source.height;
  let scale = 1;
  if(Math.max(w, h) > maxDim) scale = maxDim / Math.max(w, h);
  else if(Math.max(w, h) < minDim) scale = minDim / Math.max(w, h);
  w = Math.round(w * scale); h = Math.round(h * scale);

  // 2) Dessin en gris + débruitage léger + boost de contraste via ctx.filter.
  //    Beaucoup plus rapide que la boucle JS de sharpen d'avant, et évite
  //    d'amplifier le bruit ISO (le blur 0.5px agit comme un mini-débruiteur).
  const base = document.createElement('canvas');
  base.width = w; base.height = h;
  const bctx = base.getContext('2d', {willReadFrequently:true});
  bctx.imageSmoothingEnabled = true;
  bctx.imageSmoothingQuality = 'high';
  bctx.filter = 'grayscale(1) blur(0.5px) contrast(1.3) brightness(1.05)';
  bctx.drawImage(source, 0, 0, w, h);
  bctx.filter = 'none';

  // 3) Deskew : décisif sur les photos prises à main levée.
  let gray = _toGrayFloat(bctx.getImageData(0, 0, w, h));
  const angle = _estimateSkew(gray, w, h);
  let grayCanvas = base;
  if(Math.abs(angle) >= 0.5){
    grayCanvas = _rotateCanvas(base, -angle);
    w = grayCanvas.width; h = grayCanvas.height;
    const gctx = grayCanvas.getContext('2d', {willReadFrequently:true});
    gray = _toGrayFloat(gctx.getImageData(0, 0, w, h));
  }

  // 4) Sauvola : binarisation locale, remplace Otsu global.
  const win = Math.max(15, (Math.round(Math.min(w, h) / 40) | 1));
  const bin = _sauvolaBinarize(gray, w, h, win, 0.2);
  const binGray = new Float32Array(w * h);
  for(let i=0;i<bin.length;i++) binGray[i] = bin[i];
  const binCanvas = _grayToCanvas(binGray, w, h);

  return [grayCanvas, binCanvas];
}

// ===== WORKER TESSERACT =====
// - Langue combinée fra+eng (les noms de bières sont souvent anglophones).
// - 2 workers pour paralléliser gray + binaire (au lieu de série + budget serré).
// - withTimeout qui termine VRAIMENT le worker au dépassement (sinon Tesseract
//   continue à mouliner en tâche de fond et bloque le scan suivant).
// - Passe 2 ciblée en PSM 4 + whitelist quand le score OCR est faible.

let _ocrWorker = null;
let _ocrWorkerLang = null;
let _ocrWorker2 = null;

async function _createTessWorker(lang, onProgress){
  await ensureTesseract();
  const w = await Tesseract.createWorker(lang, 1, {
    workerPath: `https://cdn.jsdelivr.net/npm/tesseract.js@${TESS_VERSION}/dist/worker.min.js`,
    corePath: `https://cdn.jsdelivr.net/npm/tesseract.js-core@${TESS_VERSION}`,
    logger: m => {
      if(m.status === 'recognizing text' && onProgress) onProgress(Math.round((m.progress||0)*100));
    }
  });
  await w.setParameters({
    tessedit_pageseg_mode: '6',
    preserve_interword_spaces: '1',
    user_defined_dpi: '300',
    tessedit_do_invert: '0'
  });
  return w;
}

async function getOcrWorker(lang, onProgress){
  lang = lang || 'fra+eng';
  if(_ocrWorker && _ocrWorkerLang === lang) return _ocrWorker;
  if(_ocrWorker){ try{ await _ocrWorker.terminate(); }catch(e){} _ocrWorker = null; }
  if(_ocrWorker2){ try{ await _ocrWorker2.terminate(); }catch(e){} _ocrWorker2 = null; }
  _ocrWorker = await _createTessWorker(lang, onProgress);
  _ocrWorkerLang = lang;
  return _ocrWorker;
}

async function _getOcrWorker2(lang){
  if(_ocrWorker2) return _ocrWorker2;
  _ocrWorker2 = await _createTessWorker(lang);
  return _ocrWorker2;
}

// Reconnaissance avec vrai timeout : au dépassement, on TERMINE le worker.
async function _recognizeHard(worker, canvas, ms, killRef){
  let timer;
  const timeoutP = new Promise((_, reject) => {
    timer = setTimeout(async () => {
      if(killRef) killRef.killed = true;
      try{ await worker.terminate(); }catch(e){}
      reject(new Error('OCR : délai dépassé'));
    }, ms);
  });
  try{
    const res = await Promise.race([worker.recognize(canvas), timeoutP]);
    return (res && res.data && res.data.text) || '';
  }finally{ clearTimeout(timer); }
}

// Évalue rapidement si un texte OCR contient assez de signaux (volume, degré,
// DDM, lot…) — sert à décider si on doit tenter une passe supplémentaire.
function scoreOcrText(t){
  if(!t) return 0;
  let s = 0;
  if(/\b\d{1,3}\s*(?:l\b|litres?\b|L\b|cl\b)/i.test(t)) s += 2;
  if(/\d{1,2}[.,]\d{1,2}\s*%/.test(t)) s += 2;
  if(/\d{2}[\/\.\-\s]\d{2}[\/\.\-\s]\d{2,4}/.test(t)) s += 2;
  if(/\b[A-Z]\d{4,7}\b/.test(t)) s += 2;
  if(/DDM|LOT/i.test(t)) s += 1;
  s += Math.min(3, Math.floor(t.trim().length / 40));
  return s;
}

async function runOcrWithFallback(canvases, progressEl){

  const list = Array.isArray(canvases) ? canvases : [canvases];
  const BUDGET_MS = 6000;

  if(progressEl) progressEl.textContent = 'Chargement du moteur…';
  let worker;
  try{
    worker = await withTimeout(getOcrWorker('fra+eng', pct => {
      if(progressEl) progressEl.textContent = 'Chargement du moteur… ' + pct + '%';
    }), 15000, 'Chargement du moteur');
  }catch(err){
    console.warn('OCR fra+eng indisponible, fallback eng', err);
    _ocrWorker = null; _ocrWorkerLang = null;
    worker = await withTimeout(getOcrWorker('eng', pct => {
      if(progressEl) progressEl.textContent = 'Chargement du moteur… ' + pct + '%';
    }), 10000, 'Chargement du moteur (secours)');
  }

  if(progressEl) progressEl.textContent = 'Lecture de l\'étiquette…';

  // Passe 1 : gray + binaire en parallèle (2 workers).
  const results = [];
  const killA = {killed:false}, killB = {killed:false};
  let w2 = null;
  if(list.length > 1){
    try{ w2 = await _getOcrWorker2(_ocrWorkerLang || 'fra+eng'); }
    catch(e){ w2 = null; }
  }
  const pA = _recognizeHard(worker, list[0], BUDGET_MS, killA)
    .catch(e => { console.warn('OCR A échoué', e); return ''; });
  const pB = (w2 && list[1])
    ? _recognizeHard(w2, list[1], BUDGET_MS, killB).catch(e => { console.warn('OCR B échoué', e); return ''; })
    : Promise.resolve('');
  const [tA, tB] = await Promise.all([pA, pB]);
  if(killA.killed){ _ocrWorker = null; _ocrWorkerLang = null; }
  if(killB.killed){ _ocrWorker2 = null; }
  if(tA && tA.trim()) results.push(tA);
  if(tB && tB.trim()) results.push(tB);

  const merged = results.join('\n---\n');
  const score = scoreOcrText(merged);

  // Passe 2 : PSM 4 + whitelist ciblée si le score est faible (récupère
  // typiquement les champs numériques Vol/Taux/DDM/Lot mal lus).
  if(score < 6){
    const wActive = _ocrWorker || worker;
    if(wActive){
      try{
        await wActive.setParameters({
          tessedit_pageseg_mode: '4',
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,:/°%- ',
          preserve_interword_spaces: '1'
        });
        const target = list[list.length - 1];
        const extra = await _recognizeHard(wActive, target, 4000, {}).catch(() => '');
        if(extra && extra.trim()) results.push(extra);
      }catch(e){ console.warn('OCR passe 2 échouée', e); }
      finally{
        try{ await wActive.setParameters({
          tessedit_pageseg_mode: '6',
          tessedit_char_whitelist: '',
          preserve_interword_spaces: '1'
        }); }catch(e){}
      }
    }
  }

  return results.join('\n---\n');
}

// Convertit systématiquement la source (canvas OU <img>) en un vrai <canvas>, pour
// pouvoir la faire pivoter nous-mêmes ensuite (un <img> ne se pivote pas directement).
function _toCanvasSource(source, width, height){
  if(source && typeof source.getContext === 'function') return source;
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  c.getContext('2d', {willReadFrequently:true}).drawImage(source, 0, 0, width, height);
  return c;
}

// IMPORTANT (photo tournée malgré la correction EXIF) : sur certains téléphones, le
// tag EXIF "Orientation" est écrit par le système au moment où le fichier est
// finalisé, pas au moment où on appuie sur le déclencheur. Si on tourne le
// téléphone juste après avoir pris la photo (ex: photo prise en paysage puis
// téléphone remis en portrait avant que l'enregistrement soit terminé), certains
// appareils écrivent un tag EXIF qui ne correspond plus à l'orientation réelle des
// pixels. Dans ce cas précis, aucune lecture d'EXIF ne peut deviner la bonne
// rotation — la seule solution fiable est de laisser l'utilisateur corriger
// lui-même d'un tap. D'où les boutons "Tourner" ci-dessous, toujours visibles
// pendant l'analyse et en cas d'échec.
// ---- Rotation manuelle de la photo d'étiquette ----
// Objectifs : rotation *instantanée* à l'écran (via CSS transform sur l'aperçu,
// pas de re-render du panneau ni de nouveau toDataURL à chaque tap) et OCR
// relancé une seule fois quand l'utilisateur arrête d'appuyer (debounce).
// Un jeton `_scanRunId` invalide les anciens runs OCR pour éviter que le
// résultat d'une orientation périmée ne vienne écraser le résultat courant.
let _scanRotationDeg = 0;
let _scanRotateDebounce = null;
let _scanRunId = 0;

function _applyPreviewRotation(){
  const img = document.getElementById('scanPreviewImg');
  if(!img) return;
  img.style.transition = 'transform .18s ease';
  img.style.transformOrigin = 'center center';
  // Compense le ratio quand on tourne de 90°/270° pour que l'image tienne
  // dans le cadre sans déborder.
  const rot = ((_scanRotationDeg % 360) + 360) % 360;
  const sideways = (rot === 90 || rot === 270);
  const rect = img.getBoundingClientRect();
  let scale = 1;
  if(sideways && rect.width > 0 && rect.height > 0){
    scale = Math.min(1, rect.height / rect.width);
  }
  img.style.transform = `rotate(${_scanRotationDeg}deg) scale(${scale})`;
}

function rotateScanPhoto(deg){
  if(!_scanState || !_scanState.photoSource) return;
  _scanRotationDeg = (_scanRotationDeg + deg) % 360;
  // 1) Feedback visuel immédiat (aucun travail lourd) :
  _applyPreviewRotation();
  // 2) On invalide toute analyse en cours pour qu'elle n'écrase pas l'écran.
  _scanRunId++;
  // 3) On debounce la ré-analyse OCR : si l'utilisateur enchaîne les taps
  //    on ne relance l'OCR qu'une fois, avec l'orientation finale.
  if(_scanRotateDebounce) clearTimeout(_scanRotateDebounce);
  const stepEl = document.getElementById('scanStepContent');
  const status = stepEl && stepEl.querySelector('#scanProgressTxt');
  if(status) status.textContent = 'Nouvelle orientation — analyse dans un instant…';
  _scanRotateDebounce = setTimeout(() => {
    _scanRotateDebounce = null;
    analyzeScanPhoto();
  }, 320);
}

async function analyzeScanPhoto(){
  const stepEl = document.getElementById('scanStepContent');
  const baseSource = _scanState.photoSource, baseW = _scanState.photoWidth, baseH = _scanState.photoHeight;
  // Applique la rotation cumulée à une COPIE du canvas d'origine — on ne
  // touche jamais à _scanState.photoSource pour que les taps successifs
  // restent réversibles et exacts (pas d'accumulation d'artefacts).
  const rot = ((_scanRotationDeg % 360) + 360) % 360;
  let source = baseSource, width = baseW, height = baseH;
  if(rot !== 0){
    const canvas = _toCanvasSource(baseSource, baseW, baseH);
    const rotated = _rotateCanvas(canvas, rot);
    source = rotated; width = rotated.width; height = rotated.height;
  }
  let previewUrl = _scanState.photoUrl;
  try{
    if(source && source.toDataURL) previewUrl = source.toDataURL('image/jpeg', 0.82);
  }catch(e){}
  const rotateControls = '';
  const runId = ++_scanRunId;
  stepEl.innerHTML = `
    <div>Analyse de l'étiquette en cours…</div>
    <div class="scan-preview-wrap" style="overflow:hidden;display:flex;justify-content:center;">
      <img id="scanPreviewImg" class="scan-preview" src="${previewUrl}" style="will-change:transform;">
    </div>
    ${rotateControls}
    <div class="scan-spinner"></div>
    <div class="scan-progress" id="scanProgressTxt">Chargement du moteur de reconnaissance…</div>
  `;
  // La rotation en direct est déjà "cuite" dans l'image générée ci-dessus,
  // donc on remet le transform CSS à 0 pour éviter de tourner deux fois.
  _scanRotationDeg = 0;
  try{
    const canvases = preprocessForOCR(source, width, height);
    const progressEl = document.getElementById('scanProgressTxt');
    const text = await runOcrWithFallback(canvases, progressEl);
    if(runId !== _scanRunId) return; // un tap plus récent a relancé l'analyse
    if(!text || !text.trim()){
      throw new Error('Aucun texte détecté sur la photo.');
    }
    const parsed = parseLabelText(text);
    _scanState.parsed = parsed;
    _scanState.labelText = text;
    showQRStep(parsed, false);
  }catch(err){
    if(runId !== _scanRunId) return;
    console.error(err);
    stepEl.innerHTML = `
        <div>Impossible d'analyser l'étiquette. Réessaie avec une photo plus nette, bien à plat et bien éclairée, et bien droite (tourne ton téléphone si besoin, pas la photo).</div>
      <div class="scan-preview-wrap" style="overflow:hidden;display:flex;justify-content:center;">
        <img id="scanPreviewImg" class="scan-preview" src="${previewUrl}" style="will-change:transform;">
      </div>
      ${rotateControls}
      <div class="scan-error">${escapeHtml(err.message||'')}</div>
      <label class="scan-capture-btn" for="scanLabelInput">Reprendre la photo</label>
      <input type="file" id="scanLabelInput" accept="image/*" capture="environment" style="display:none">
    `;
    document.getElementById('scanLabelInput').addEventListener('change', onLabelPhotoSelected);
  }
}

async function onLabelPhotoSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  // On corrige toujours l'orientation EXIF ici, avant tout traitement : c'est ce qui
  // évite que les photos prises en paysage (ou en portrait, selon les téléphones) ne
  // soient lues de travers par l'OCR.
  const {source, width, height, url} = await loadOrientedImage(file);
  refreshMobileOrientationLayout();
  _scanRotationDeg = 0;
  if(_scanRotateDebounce){ clearTimeout(_scanRotateDebounce); _scanRotateDebounce = null; }
  _scanState.photoSource = source;
  _scanState.photoWidth = width;
  _scanState.photoHeight = height;
  _scanState.photoUrl = url;
  await analyzeScanPhoto();
}

// ---- Scan QR en continu via la caméra : plus besoin de "réussir" une photo,
// chaque image du flux vidéo est analysée automatiquement jusqu'à détection. ----
// La caméra est coupée dès que le scan s'arrête (succès ou fermeture) pour que le voyant/
// icône caméra du navigateur s'éteigne immédiatement. Safari (et les autres navigateurs)
// retiennent l'autorisation déjà accordée : la relancer ne redemande pas la permission.
// Ratio du guide principal : priorité absolue à la lecture, donc le cadre est large
// et le moteur analyse aussi l'image entière en priorité.
const LIVE_SCAN_FRAME_RATIO = 0.98;
// Nombre de lectures identiques consécutives requises avant de valider un scan : évite
// qu'un reflet, un flou passager ou un morceau de code voisin ne déclenche une détection
// prématurée et erronée. Ça laisse aussi le temps de bien viser.
// BarcodeDetector natif : quasi zéro faux positif sur qr_code, on valide dès la 1re lecture
// pour un ressenti "instantané".
const LIVE_SCAN_CONFIRM_COUNT_BD = 1;
const LIVE_SCAN_CONFIRM_COUNT_JSQR = 2;

let _liveScan = {stream:null, raf:null, video:null, canvas:null, ctx:null, running:false, timer:null, lastData:null, matchCount:0, jsqrReady:false, tickBusy:false, frameIndex:0};
let _liveScanRunId = 0;
let _liveScanCam = {track:null, zoomRange:null, zoomIndex:0, zoomSteps:[1], torchOn:false, torchSupported:false};

function stopLiveQrScan(){
